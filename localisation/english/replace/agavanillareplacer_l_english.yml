 GER_inner_circle_industrial_me_focuses_tt: "(Bu odağı tamamlamak, ilgili $GER_inner_circle_member_title$ları için §Y$FOCUS_1$§! ve §Y$FOCUS_2$§!'yi §Rkilitleyecektir§!)"
 GER_intrigue_replacing_advisor_already_ascended_tt: "§Y$CHARACTER$§!, §Yİç Çember§! içinde galip gelir ve §Y$FOCUS$§! odağını tamamlayabilecektir. \n\n§Y$CHARACTER_2$§! ve §Y$CHARACTER_3$§!, ilgili karşılıklı dışlayıcı odaklarını tamamlamaya artık çalışmayacaktır."
