 news.235.t:0 "Fear Bakü'de Yakalandı"
 news.235.d:0 "Joyous news for AGA today as his enemy Fear, has been found in Bakü. While escaping to rural areas, he was stopped by a [GER.GetAdjective] patrol, who immediately recognized him for his iconic azeri accent. After having him say "at doktrini en iyisi" for 100 times the esteemed self proclaimed gay was 'convinced' to come along to entertain the [GER.GetAdjective] troops stationed in the region.\n\nNow he is going to be sent to Berlin, where AGA will finally get to take revenge on this donkey hater. While Frisk risks putting a damper on the meeting, AGA is awaiting the moment as giddy as a child."
