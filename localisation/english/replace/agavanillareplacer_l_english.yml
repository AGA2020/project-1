 GER_oppose_hitler_ww: "Wehrmacht'ı Topla"
 GER_oppose_hitler_ww_desc: "Hitler'in saltanatı sona ermeli. Ren Bölgesi'ni yeniden askerileştirerek Batı güçlerini kışkırtmayı planlıyor, ancak bunu yapmak bize Wehrmacht'taki sadık unsurların yardımıyla iktidarı ele geçirmek ve Almanya halkını ona karşı toplamak için ihtiyacımız olan bahaneyi verecektir."
 GER_rally_the_nation: "Ulusu Topla"
 GER_rally_the_nation_desc: "Ulusumuz içinde, fırsat doğduğunda Nazilere karşı durmaya istekli birçok kişi var. Halkı toplamalı ve hatta Weimar Cumhuriyeti günlerinden beri Nazilere karşı savaşma deneyimi olan paramiliter örgütlerle temas kurmalıyız."
 GER_rally_the_nation_tt: "İç savaşın sonunda ya §YDeğiştirilmesi§! ya da §RKaldırılması§! gereken bir ulusal ruh seçebileceğiz."
 GER_denazification_campaigns: "Nazilerden Arındırma Kampanyaları"
 GER_denazification_campaigns_desc: "[GER.GetNameDef]'in tam kalbini enfekte eden Nazi hastalığından gerçekten kurtulmak için, Nazileri veya onları barındıranları bulur bulmaz kapsamlı bir şekilde nazilerden arındırma ve tutuklama çabası göstermeliyiz."
 GER_rebuild_the_nation_ww: "Ulusu Yeniden İnşa Et"
 GER_rebuild_the_nation_ww_desc: "Nazi belasından kurtulmanın ardından toparlanmak istiyorsak tüm çabalarımızı hızlı yeniden yapılanmaya odaklamalıyız. Halk bu arada mütevazı yaşamak ve sıkı çalışmak zorunda kalacak, ancak daha iyi bir yarın vaadiyle bunu kesinlikle yapacaklardır."
 GER_revitalize_the_nation: "Ulusu Canlandır"
 GER_revitalize_the_nation_desc: "İç savaşın yıkımlarından sonra ulusumuzu yeniden inşa etmeye bakmalıyız. Halktan kişisel konforlarını bir süreliğine bir kenara bırakmalarını isteyeceğiz, böylece tüm kaynaklarımızı bu hedefe ulaşmaya odaklayabiliriz."
 GER_rebuild_the_nation_ww_tt: "Kararın kilidini açar: §Y$GER_public_works_modifier$§!"
 GER_tend_to_the_future_of_germany: "Almanya'nın Geleceğiyle İlgilen"
 GER_tend_to_the_future_of_germany_desc: "Almanya Nazilerden başarıyla kurtarıldığına göre, ileriye yeni ufuklara bakmalı ve ulusumuzun gelecekteki yörüngesine karar vermeliyiz. Birlik, adalet ve özgürlük için!"
 GER_tend_to_the_future_of_germany_tt: "Herhangi bir §YAyrılıkçı İsyan§! girişimi başarıyla engellenecektir"

 #COMMUNISM
 GER_start_the_proletarian_revolution: "Proleter Devrimi Başlat"
 GER_start_the_proletarian_revolution_desc: "İlk iç savaştan sonra işçilerin sesinin daha fazla duyulacağını ummuştuk. Ancak durum böyle görünmüyor, proletarya daha iyisini hak ediyor ve onların ayaklanmasına izin vererek, sonunda proletaryayı kayıranlara gücü güvence altına alabiliriz."
 GER_start_the_proletarian_revolution_civil_war_tt: "Görev süresi dolarsa bu bir §Rİç Savaş§!'a yol açacaktır!"
 GER_states_with_proletarian_uprising_joins_cw_tt: "§Y$GER_proletariat_uprising_modifier$§! değiştiricisine sahip eyaletler, bir İç Savaş durumunda §YKominist§! tarafa katılacaktır."
 GER_the_proletarian_revolution_flag: "Proleter Devrimi devam ediyor."
 GER_formalize_the_intelligence_wing: "İstihbarat Kanadını Resmileştir"
 GER_formalize_the_intelligence_wing_desc: "Ülke, halkın çıkarını düşünmeyen yöneticiler altında büyük acılar çekti. Ulusu şimdi yeniden inşa edebildiğimizden emin olmak için önce neyle çalışmamız gerektiğini bilmeliyiz. İşlevsel bir İstihbarat Kanadı iyi bir başlangıç olacaktır!"
 GER_propaganda: "Ülke Çapında Propaganda"
 GER_propaganda_desc: "Propagandanın gücünü daha önce gözlemledik ve etkinliğini inkar edemeyiz. Şanlı liderlerimize desteği artırmak için kaynak ayırarak, nüfusumuzu tam istediğimiz yerde tuttuğumuzdan emin oluruz."
 GER_form_the_stasi: "Stasi'yi Kur"
 GER_form_the_stasi_desc: "İstihbarat Kanadı büyük bir başarı oldu ve şimdi Devlet Güvenliği ile ilgilenen bir Bakanlık oluşturma olasılığını incelemeye başladık. Halk arasında en popüler karar olmayabilir, ancak gerekli bir karardır."
 GER_effective_operations: "Etkili Operasyonlar"
 GER_effective_operations_desc: "Stasi büyümeye devam ettikçe operasyon alanını genişletmeliyiz. [ROOT.GetAdjective] sınırlarının ötesinde yürütülen görevler, devlet güvenliğimiz için ülke içinde başlatılanlar kadar önemlidir."
 GER_assemble_red_orchestra: "Kızıl Orkestra'yı Topla"
 GER_assemble_red_orchestra_desc: "Kızıl Orkestra hiçbir zaman sağlam bir grup olmadı, daha ziyade birkaç becerikli bireyin etrafında toplanmış bir dizi insandı. Ancak bu sözde örgütün bazı üyeleri son derece yetenekliydi ve onları işe almayı düşünmeliyiz."
 GER_ressurect_the_red_front_fighters_league: "Kızıl Cephe Savaşçıları Birliği'ni Dirilt"
 GER_ressurect_the_red_front_fighters_league_desc: "Kızıl Cephe Savaşçıları Birliği, Weimar Cumhuriyeti sırasında harekete bağlı bir paramiliter örgüttü. Faşist rejim altında hem polise hem de diğer zalimlere karşı cesurca savaştılar. Eski rejimimizin genellikle kullandığı aynı şekilde, Kızıl Cephe Savaşçıları bunun için yasaklandı. Onları geri getirme zamanı geldi!"
 GER_spawn_more_communist_militias_in_civil_war_tt: "Başka bir §Yİç Savaş§! patlak verirse, §Y$GER_proletariat_uprising_modifier$§! tarafından etkilenen üç çekirdek eyalette §Y2 Alman§! birimi oluştur!"
 GER_ressurect_the_red_front_fighters_league_tt: "Şu anda §Y$GER_proletariat_uprising_modifier$§! tarafından etkilenen veya §Y[ROOT.GetAdjective] Komünistleri§! tarafından kontrol edilen §Yüç rastgele eyalette§! §Y2 Milis Birimi§! ortaya çıkacaktır."
 GER_reorganize_nationale_volksarmee: "Nationale Volksarmee'yi Yeniden Düzenle"
 GER_reorganize_nationale_volksarmee_desc: "Yolsuzluk ve faşist duygular ordumuzun içinde hala derinlere kök salmıştır. Muhalefeti ve isyanı önlemek için bize zarar vermek isteyenleri ayıklamalıyız. Bu, saflarda büyük bir boşluk bırakacaktır, bu yüzden halkımızın güvenliğini sağlamak için, bu tür eylemler gerekirse cesur askerlerimizi savaşa götürmek üzere yeni, sadık generaller atamalıyız."
 GER_cannot_join_oppossing_civil_war_side_tt: "Bu karakterler potansiyel bir §Yİç Savaş§!'ta karşı tarafa katılamayacaktır:"
 GER_ensure_army_loyalty: "Ordu Sadakatini Sağla"
 GER_ensure_army_loyalty_desc: "Saflarda, uymak zorunda kaldıkları aptallık yerine hala davamıza kazanılabilenler var. Biraz çalışma gerektirecek ama askerlerimize iyi bir toplumsal ruh aşılayarak yıllarca sadakatlerini sağlayabiliriz."
 GER_political_commissars: "Siyasi Komiserler"
 GER_political_commissars_desc: "Saflarda, uymak zorunda kaldıkları aptallık yerine hala davamıza kazanılabilenler var. Sorumluluğu sıradan askeri komünizmin faydaları konusunda eğitmek ve sadakati sağlamak üzere onları organize etmek olan subaylar atamalıyız."
 GER_rapid_army_expansion: "Hızlı Ordu Genişlemesi"
 GER_rapid_army_expansion_desc: "Ordumuz, çok ihtiyaç duyulan değişikliklerimizden sonra eskisi gibi aynı oranda büyümüyor. Giderek daha düşmanca bir dünyada halkımızı korumak için hala büyük bir orduya ihtiyacımız var. Önemli bir seferberlik ve eğitim hamlesi bu sorunu çözmelidir."
 GER_the_peoples_victory: "Halkın Zaferi"
 GER_the_peoples_victory_desc: "Halk konuştu ve halk duyuldu. Eski ve yozlaşmış hükümetimiz zayıflık belirtileri gösterdi ve istifalarını talep etme ve gücü kendimiz için, halk adına ele geçirme fırsatını değerlendirmeliyiz!"
 GER_legacy_of_the_spartacus_league: "Spartaküs Birliği Mirası"
 GER_legacy_of_the_spartacus_league_desc: "Spartaküs Birliği, 1919'da Kommunistische Partei Deutschlands kurulduğunda varlığı sona erdi, ancak bazı fikirleri geri getirmeye değer. Birlik, temelini demokratik seçimlere ve halkın iradesine dayandıran, ancak gerekirse devrimci gruplara izin veren sosyalist bir cumhuriyet yaratma vizyonlarına sahipti. Bu hedefe doğru yeniden çalışma zamanı geldi."
 GER_social_ownership: "Sosyal Mülkiyet"
 GER_social_ownership_desc: "Önemli devlet hizmetlerinin, hedefi halk için en iyisiyle uyumlu olmayan insanlar tarafından yönetilmesine izin verildiğinde ne olduğunu gördük. Bunun bir daha asla olmasını önlemek için sanayimizi kamu mülkiyetine devretmeliyiz."
 GER_civil_liberties: "Sivil Özgürlükler"
 GER_civil_liberties_desc: "Yoldaşlarımız arasında, devletin verimli ve güvenli bir şekilde işlemesi için her bireyi uyuma zorlaması gerektiği yönünde bir yanlış anlaşılma var. Ancak bu, sosyalizmin hedeflerine aykırıdır. Yalnızca sivil özgürlüklerin korunması yoluyla halk devlete gerçekten sadık olacaktır."
 GER_embrace_democratic_institutions: "Demokratik Kurumları Benimse"
 GER_embrace_democratic_institutions_desc: "Liberal demokrasi burjuvazi için bir cepheden başka bir şey değildir. Gerçek demokrasi ekonomik ve sosyal eşitliği gerektirir. Bu nedenle, halkın iradesini ulusun yönetme sürecine tam olarak dahil etme konumunda olan yalnızca biziz."
 GER_establish_volkskommissariats: "Volkskommissariatları Kur"
 GER_establish_volkskommissariats_desc: "Yabancı işgali kabul edilemez, ancak yeni özgürleşmiş komşularımız arasında meşru işçi liderliğindeki hükümetler kurmak için, vekillik gibi zor bir sorumluluğu üstlenecek ve onları sosyalist ideale doğru yönlendireceğiz."
 GER_establish_volkskommissariats_tt: "Mevcut ve gelecekteki tüm §Ykomşu tabi devletlerde§! ideolojimizi paylaşan §YVolkskommissariatlar Kurma§! kararlarının kilidini açar."
 GER_industrialize_volkskommissariats: "Volkskommissariatları Sanayileştir"
 GER_industrialize_volkskommissariats_desc: "Ekipman eksikliği nedeniyle emeğin verimsiz uygulanması, Volkskommissariatların endüstrilerinin [ROOT.GetAdjective] muadillerinin gerisinde kalmasına neden oluyor. Bu dengesizliği düzeltmek için sanayileşme planlarına yatırım yapmalıyız."
 GER_industrialize_volkskommissariats_tt: "§YVolkskommissariatlarda§! §YSanayileşme Çabaları§! yürütme Kararlarının kilidini açar!"
 GER_protect_the_revolution: "Devrimi Koru"
 GER_protect_the_revolution_desc: "Bazıları yurtdışındaki müdahalelerimizi nüfuz kazanma oyunu olarak görse de, görevimizin sınırlarımızın ötesinde bile proletaryayı korumak olduğunu biliyoruz. Bunu yapmak için, uluslararası kabul edilebilirliğin normal sınırlarının dışında hareket etme yeteneğine sahip olmalıyız."
 GER_protect_the_revolution_tt: "[ROOT.GetNameDef] tarafından bir İç Savaşın tetiklendiği §Ykomşu ülkelerin§! §YBoyun Eğmesini Talep Etme§! kararının kilidini açar"
 GER_instill_german_discipline: "Alman Disiplinini Aşıla"
 GER_instill_german_discipline_desc: "Volkskommissariatların ordularına baktığımızda, [ROOT.GetAdjective] disiplin ve verimlilik standartlarından yoksun oldukları acı verici bir şekilde açıktır. Rakiplerimize karşı daha iyi savunma yapabilmeleri için onları bu konularda eğitmeliyiz."
 GER_integrate_subjects_economies: "Tabi Devletlerin Ekonomilerini Entegre Et"
 GER_integrate_subjects_economies_desc: "Volkskommissariat ekonomileri bizim vekilliğimiz altında büyük ilerleme kaydetti. Verimliliği daha da en üst düzeye çıkarmak için sanayilerimizi tek bir ekonomik blokta birleştireceğiz."
 GER_current_future_volkskommisariats_tt: "Tüm mevcut ve gelecekteki §YVolkskommissariatlar§!:"
 GER_integrate_volkskommissariats: "Volkskommissariatları Entegre Et"
 GER_integrate_volkskommissariats_desc: "Volkskommissariatlar, Avrupa'nın özgürleşmiş halklarını sosyalizme yönlendirmek amacıyla kurulmuştu. Ancak ekonomilerimiz ve kültürlerimiz iç içe geçtikçe, [ROOT.GetAdjective] olmanın ne anlama geldiğinin genişletilmesini savunan yeni bir kimlik duygusu ortaya çıktı. Bundan böyle tek halk, tek ülkeyiz."
 GER_integrate_volkskommissariats_tt: "§YVolkskommissariatları Entegre Etme§! Kararlarının kilidini açar. §Y[ROOT.GetNameWithFlag]§! ilk §YVolkskommissariat§!'ı entegre ettiğinde ülke §Y$GER_german_socialist_union_communism$§! olarak bilinecektir!"
 GER_expand_social_welfare: "Sosyal Refahı Genişlet"
 GER_expand_social_welfare_desc: "Büyük Savaş'tan sonra halka fayda sağlamak için bir refah sistemi geliştirmeye başladık, ancak bu Büyük Buhran'dan sonra daha sınırlı hale geldi. Bu kurumu yeniden inşa etmek için kaynakları akıtmalı ve onu her Alman için bir onur nişanı haline getirmeli, dünyaya Komünizmin üstünlüğünü kanıtlamalıyız."
 GER_liberate_austria: "Avusturya'yı Özgürleştir"
 GER_liberate_austria_desc: "Güneydeki komşularımız uzun süredir halk için korkunç koşullar altında yaşıyorlar. Başka bir ülkeyi vatanları olarak adlandırsalar da çok benzerliğimiz var ve hatta bir dil paylaşıyoruz. [AUS.GetAdjective] halkının iyiliği için bir talep, hayır, bize katılma teklifi uzatacağız!"
 GER_spark_the_flame_of_revolution: "Devrim Ateşini Yak"
 GER_spark_the_flame_of_revolution_desc: "Komşu ülkelerdeki işçilerin durumu olmasını istediğimiz kadar iyi değil. Uzun vadede bu ülkelerde silahlı bir devrim kaçınılmaz olacaktır, ancak şimdilik en azından bu ülkelerde komünizm sözünü yaymaya çalışmalıyız."
 GER_spark_the_flame_of_revolution_tt: "§Yküçük komşu ülkelerde§! §YKominist Duyguları Güçlendirme§! kararlarının kilidini açar. Etkilenen ülkede komünistler çoğunluk desteğini kazandığında, ülkeyi §YKominist§! yapmak için bir §Yİç Savaş§! patlak verecektir."
 GER_proletarian_international_alliance: "Proleter Enternasyonal"
 GER_support_the_proletarian_uprising: "Proleter Ayaklanmasını Destekle"
 GER_support_the_proletarian_uprising_desc: "Yakın çevremizdeki iç savaşların sayısında keskin bir artış öngördüğümüz için, ayaklanan işçileri en iyi nasıl destekleyeceğimize dair duruşumuzu güncellemeliyiz. Bu işçiler böyle bir girişime hazırlıksız olabilirler ve en azından iyi donanımlı olduklarından emin olarak, Avrupa'nın bizim bölgemizde kırmızı bir dalganın yayılmasını sağlayabiliriz."
 GER_support_the_proletarian_uprising_tt: "§Y[ROOT.GetAdjective]§!'nin §YKominist§! duyguları güçlendirmesi sonucu şu anda bir iç savaşla sarsılan ülkelere §YPiyade Ekipmanı§! gönderme §YKararlarının§! kilidini açar."
 GER_the_proletarian_legion: "Proleter Lejyonu"
 GER_the_proletarian_legion_desc: "Başlattığımız ayaklanmaların sorumluluğunu üstlenmeliyiz. Şu anda iç savaşla harap olan bu ülkelerdeki proletaryanın, yozlaşmış rejimlerine en kısa sürede son vermek için yardımımıza ihtiyacı var. Onlara yardım etmek için asker göndermeyi düşünmeliyiz!"
 GER_the_proletarian_legion_tt: "§Y[ROOT.GetNameWithFlag]§!'nin §YKominizm§!'i teşvik ettiği §YHerhangi Bir Ülke§! bir §Yİç Savaşa§! girdiğinde:"
 GER_strengthen_the_proletarian_international: "Proleter Enternasyonali Güçlendir"
 GER_strengthen_the_proletarian_international_desc: "Komşu ülkelerimizdeki işçiler hakları için ayağa kalkarken, güvenilir bir ittifak olarak konumumuzu güçlendirmek için bolca fırsat görüyoruz. Bu yeni kurulan Komünist devletleri Proleter Enternasyonale davet ederek hepimiz daha güçlü olabiliriz."
 GER_strengthen_the_proletarian_international_tt: "§YAvrupa§!'daki §Y[GER.GetNameWithFlag]§!'nin §YKominizm§!'e doğru etkilediği her ülke §YProleter Enternasyonale§! davet edilecektir. Bu etki, §Ybu odak alındıktan sonra§! Komünizme doğru etkilenen ülkeler için de geçerli olacaktır."
 GER_proletarian_solidarity: "Proleter Dayanışması"
 GER_proletarian_solidarity_desc: "Avrupa'yı Komünizm yoluna sokma çabalarımızın arkasına önemli ölçüde zaman ve kaynak koyduk. Emeğimizin faydalarını şimdi toplamamız adil değil mi?"
 GER_proletarian_solidarity_decision_tt: "[GER.GetName]'in Komünist olmasına yardım ettiği ülkelerle kaynak ticaretini artırmak için Karar kilidini aç: §YProleter Dayanışmasını Teşvik Et§!"
 GER_liberate_italy: "İtalya'yı Özgürleştir"
 GER_liberate_italy_desc: "[ITA.GetAdjective]'ler uzun süredir [ITA.GetLeader]'in yönetimi altında acı çekiyorlar. Bir zamanlar kendi eski hükümetimizin sözde müttefikiydiler ve şimdi daha iyiye doğru değiştiğimize göre, onları da yanımıza getirmek bizim görevimiz olmalı!"
 GER_the_end_to_fascist_europe: "Faşist Avrupa'nın Sonu"
 GER_the_end_to_fascist_europe_desc: "Şu anda bile Avrupa'da Faşist bir yönetime tabi olan ülkeler var. Bu durumun bir nüfus üzerinde yarattığı gerginliğin farkında olduğumuz için, bu ülkelerin derhal özgürleştirildiğinden emin olmalıyız!"
 GER_bypass_end_to_fascist_europe_tt: "Değil: Başka herhangi bir ülke:\n   Başkent Eyaleti: §YAvrupa§!'da!\n   Mevcut iktidar partisi §YFaşist§!." #Girintiler tt'nin doğru görünmesi için orada
 GER_war_against_fascism_tt: "[GER.GetNameDef]'in henüz savaş hedefi olmadığı §YAvrupa§!'daki herhangi bir §YFaşist§! ulusa karşı §Yİlhak§! savaş hedefi kazan. Mevcut etki:"
 GER_red_europe: "Kızıl Avrupa"
 GER_red_europe_desc: "İşçileri silahlanmaya ve kızıl bayrağı yükseltmeye teşvik etme çabalarımızı yakın komşu ülkelerimizle sınırlayamayız. Proleter devrimini Avrupa geneline yaymalıyız!"
 GER_spark_the_flame_of_revolution_red_europe_tt: "§Yküçük Avrupa ülkelerinde§! §YKominist Duyguları Güçlendirme§! kararlarının kilidini açar. Etkilenen ülkede komünistler çoğunluk desteğini kazandığında, ülkeyi §YKominist§! yapmak için bir §Yİç Savaş§! patlak verecektir."
 GER_root_out_imperialism: "Emperyalizmi Kökünden Sök"
 GER_root_out_imperialism_desc: "Emperyalizmin kökleri Afrika ve Asya topraklarında derinlere uzanıyor ve oradaki işçileri zincirliyor. Bu insanlar çok uzun süredir sömürgecilik altında acı çekiyorlar. Sömürüyü sona erdirmeli ve ezilen kitlelere ayağa kalkma, kaderlerini ele geçirme ve düşmanlarımızın dikkatini dağıtma araçlarını vermeliyiz."
 GER_root_out_imperialism_tt: "§YAfrikalı§! ve §YAsyalı§! ülkelerde direnişi ve özerklik kazanımını artırma §YKararlarının§! kilidini açar."
 GER_strengthen_the_proletarian_international_internationally_tt: "§YAvrupa dışındaki§! §Y[GER.GetNameWithFlag]§!'nin §YKominizm§!'e doğru etkilediği her ülke §YProleter Enternasyonale§! davet edilecektir. Bu etki, §Ybu odak alındıktan sonra§! Komünizme doğru etkilenen ülkeler için de geçerli olacaktır."
 GER_hegemony_over_europe: "Avrupa Üzerinde Hegemonya"
 GER_hegemony_over_europe_desc: "Eski, emperyal Avrupa çöküyor. Onun yerine yeni bir sosyalist düzen kuracağız, Avrupa işçileri burjuva tiranlığına karşı onlara liderlik etmemiz için bize bakacak. Proleter bir zafer kıta genelinde hegemonyamızı kuracaktır."
 GER_war_against_major_countries_in_europe_tt: "§YAvrupa§!'da en az bir eyaleti kontrol eden tüm §YBüyük§! uluslara karşı §Yİlhak§! savaş hedefi kazan. Mevcut etki:"
 GER_align_south_america: "Güney Amerika'yı Hizala"
 GER_align_south_america_desc: "Güney Amerika işçileri kapitalizmin boyunduruğu altında yeterince acı çekti. Onları davamıza kazanmak kesinlikle kıta genelinde sadık müttefiklere yol açacaktır."
 GER_communist_propaganda_south_america_decision_tt: "§Yküçük Güney Amerika ülkelerinde§! §YKominist Duyguları Güçlendirme§! kararlarının kilidini açar. Etkilenen ülkede komünistler çoğunluk desteğini kazandığında, ülkeyi §YKominist§! yapmak için bir §Yİç Savaş§! patlak verecektir."
 GER_wage_war_on_capitalism: "Kapitalizme Savaş Aç"
 GER_wage_war_on_capitalism_desc: "Kapitalizm Komünizmin doğal düşmanıdır ve gerekirse zorla ortadan kaldırılmalıdır. Kapitalizmin tam da sembolü olan [USA.GetNameDef]'e karşı bu hücuma liderlik edecek, yeni bir sosyalist çağın yolunu açacağız."
 GER_instigate_middle_eastern_revolutions: "Orta Doğu Devrimlerini Kışkırt"
 GER_instigate_middle_eastern_revolutions_desc: "Orta Doğu uzun süredir yabancı güçler tarafından ezildi ve sosyalist bir devrim için olgunlaştı. Halkın sömürüden nihayet kurtulma ve sosyalizmin kızıl bayrağını yükseltme konusundaki gizli arzusunu körüklemeliyiz."
 GER_communist_propaganda_middle_east_decision_tt: "§Yküçük Orta Doğu ülkelerinde§! §YKominist Duyguları Güçlendirme§! kararlarının kilidini açar. Etkilenen ülkede komünistler çoğunluk desteğini kazandığında, ülkeyi §YKominist§! yapmak için bir §Yİç Savaş§! patlak verecektir."
 GER_intervene_in_spain: "İspanya'ya Müdahale Et"
 GER_intervene_in_spain_desc: "İspanya'daki yoldaşlarımıza Faşizm güçlerine karşı elimizden gelen her şekilde yardım etmek görevimizdir. Savaşta sertleşmiş birlikler göndermek kesinlikle takdir edilecektir."
 GER_assist_our_eastern_comrades: "Doğudaki Yoldaşlarımıza Yardım Et"
 GER_assist_our_eastern_comrades_desc: "Uzak doğudaki yoldaşlarımızın mücadeleleri onları yıprattı. Onları elimizden geldiğince rahatlatmalıyız. Savaşta sertleşmiş birlikler göndermek onlar için talihin gidişatını değiştirebilir."
 GER_strike_at_the_rising_sun: "Yükselen Güneşe Darbe Vur"
 GER_strike_at_the_rising_sun_desc: "[JAP.GetNameDefCap] bir emperyalizm kalesi olmaya devam ediyor, eşitlik ve sosyalizm isteyen herkesi eziyor. Japonların hizaya getirilip yeni proleter dünya düzenini kabul etme zamanı geldi."
 GER_nationalize_industries: "Sanayileri Millileştir"
 GER_nationalize_industries_desc: "Ekonomimizin devlet merkezileşmesinin olumlu sonucunu gördükten sonra, sanayimiz için de aynısını düşünebiliriz. Şu anki haliyle sanayi, farklı süreçler ve mal üretme yöntemleri kullanan birçok özel mülk sahibinin altında bölünmüş durumda. Sanayileri millileştirmek, üretim çıktısı ve verimliliği üzerinde bize çok daha fazla kontrol sağlayacaktır."
 GER_form_agricultural_cooperatives: "Tarım Kooperatifleri Kur"
 GER_form_agricultural_cooperatives_desc: "Tarım sektörü bizim için en önemli sektörlerden biridir. Birçok sanayi, çiftlik işçilerine ve onların çalışmalarına bağlıdır ve onları kendi başlarına bırakmak pek sorumlu bir davranış değildir. Kooperatifler kurarak, tarım sektörünün maksimum verimlilik ve minimum kayıpla uyum içinde birlikte çalışmasını sağlayabiliriz."
 GER_effectivize_the_volkswerke: "Volkswerke'yi Etkinleştir"
 GER_effectivize_the_volkswerke_desc: "Sözde Volkswerke, seleflerimizin sahip olduğu birkaç fikirden biridir. Madencilik ve çelik endüstrisi içinde büyümeyi ve üretimi denetlemek üzere devlet kontrolündeki bir sanayi holdingi olarak Volkswerke, ona yapabileceğimiz tüm iyileştirmelere layıktır."
 GER_womens_rights_and_equality: "Kadın Hakları ve Eşitliği"
 GER_womens_rights_and_equality_desc: "Cinsiyet, bir bireyin ülkesine nerede hizmet etmesinin beklendiği konusunda uzun süredir belirleyici bir faktör olmuştur, ister cephede, ister fabrikalarda, ister evde olsun. Daha eşit bir yük dağılımı peşinde koşarak, ihtiyaç duyulursa daha büyük bir işgücüne ve daha büyük bir orduya olanak tanırız."
 GER_locks_women_in_workforce_decision_tt: "§Y$women_in_the_workforce$§! Kararı §Ykullanılamaz§! hale gelir!"
 GER_labor_rights_and_union_stuff: "Sendikalar Kur"
 GER_labor_rights_and_union_stuff_desc: "İşçilerin endişelerini dile getirmek ve çalışma koşullarını belirlemek üzere birlikte sendikalaşmalarına izin vermek ülkemizde uzun süredir ihmal edilmiştir. Devletin sadece işçi sendikalarının kurulmasına izin vermekle kalmayıp teşvik etmesinin zamanı gelmiştir!"
 GER_proletarian_dictatorship: "Proleter Diktatörlüğü"
 GER_proletarian_dictatorship_desc: "Halkımıza en iyi olanakları ve yaşam standartlarını sağlamak için, halkla ve onların ihtiyaçlarıyla uyumlu istikrarlı bir liderlik sağlamalıyız. Proletarya için uzun süredir savaşan [ROOT.GetLeader], tüm nitelikleri karşılıyor ve işçiler için en iyisinden başka bir şey düşünmediğini kanıtladı."
 GER_state_controlled_economy: "Devlet Kontrollü Ekonomi"
 GER_state_controlled_economy_desc: "Ekonomimiz, onu en iyi nasıl yöneteceğini bilmeyen insanlara bırakılamayacak kadar kırılgandır. Halkımız üzerinde uzun vadeli etkileri olacak bir ekonomik krizden kaçınmak için devlet ekonomimizin kontrolünü ele almalıdır."
 GER_central_planning: "Merkezi Planlama"
 GER_central_planning_desc: "Ekonomimiz artık devletin elinde olduğuna göre, ekonomik planlamamızın da merkezileştirilmesi doğru görünüyor. Sonuçta, yalnızca ülkenin ekonomisine genel bir bakışa sahip olanların nereye yatırım yapılacağı ve kaynakların en iyi nasıl dağıtılacağı konusunda en iyi kararları vermesi beklenebilir."
 GER_the_german_stakhanovite_movement: "Alman Stakhanov Hareketi"
 GER_the_german_stakhanovite_movement_desc: "Stakhanov hareketi, işçilerin gerçekten beklenenden daha sıkı çalışmaktan ve daha fazla üretmekten gurur duymaya başlamasıyla komünist yönetim altındaki [SOV.GetName]'da ortaya çıktı. Bu hareket üretimi fırlattı ve işçilere daha güçlü bir amaç duygusu sağladı. Burada [ROOT.GetNameDef]'de benzer duyguları teşvik etmeyi düşünmeliyiz."
 GER_the_german_stakhanovite_movement_tt: "§Y$GER_establish_the_reichswerke$§! veya §Y$GER_invest_in_vereinigte_stahlwerke$§!'den birini tamamlayarak bu odak, kazanılan kaynak miktarını §G%5§! oranında değiştirecektir."
 GER_spheres_of_influence: "Nüfuz Alanları"
 GER_spheres_of_influence_desc: "Bu kadar yakın mesafede benzer düşünen iki ülkeyle, kendimiz ve [SOV.GetAdjective] için eşit bir oyun alanı oluşturmalıyız. Bir nüfuz alanı oluşturarak ve doğudaki yoldaşlarımız için bir tane belirleyerek, silahlı çatışma riskini sınırlarız."
 GER_spheres_of_influence_tt: "Biz ve §Y[SOV.GetNameWithFlag]§!, §YAvrupa§!'daki Nüfuz Alanlarımızı kuracağız.\n\nBizim §YNüfuz Alanımız§! şunları içerecektir:\n§Y[SWE.GetNameWithFlag]\n[NOR.GetNameWithFlag]\n[DEN.GetNameWithFlag]\n[POL.GetNameWithFlag]§! (Batı)\n§Y[CZE.GetNameWithFlag]§! (Batı)\n§Y[HUN.GetNameWithFlag]§!\n\nOnların §YNüfuz Alanı şunları içerecektir§!:\n§Y[FIN.GetNameWithFlag]\n[EST.GetNameWithFlag]\n[LAT.GetNameWithFlag]\n[LIT.GetNameWithFlag]\n[SLO.GetNameWithFlag]\n[POL.GetNameWithFlag]§! (Doğu)\n§Y[ROM.GetNameWithFlag]\n[BUL.GetNameWithFlag]\n[YUG.GetNameWithFlag]§!"
 GER_czechoslovakia: "[CZE.GetName]'daki İşçileri Özgürleştir"
 GER_czechoslovakia_desc: "Güneydeki sınırın hemen karşısında, [CZE.GetNameDef]'de, hala kapitalizmin zincirlerinden kurtarılması gereken işçiler var. Henüz komünizmin doğru biçiminin ışığını tam olarak görmediler ve ne şekilde olursa olsun onlara ulaştırmamız gerektiğinden emin olmalıyız. İyi yoldaşlar olarak görevimiz budur."
 GER_poland: "[POL.GetAdjective] Proletaryasını Koru"
 GER_poland_desc: "[POL.GetNameDef]'deki proletarya henüz bizim [ROOT.GetAdjective] işçilerimizle aynı haklara sahip değil. Mevcut liderlikleri altında gelişemedikleri için, onları özgürleştirme ve koruma zamanı gelmiş olabilir."
 GER_hungary: "[HUN.GetAdjective] İşçilerinin Baskısına Son Ver"
 GER_hungary_desc: "[HUN.GetNameDef]'deki işçiler hala temel olması gereken haklar için mücadele ediyorlar. Ülkedeki hükümet açıkça onların ihtiyaçlarını görmeyi başaramadı ve bu nedenle, [HUN.GetName] genelindeki proletaryanın adil ve hak ettikleri saygıyla muamele görmesini sağlamak için müdahale etmeliyiz."
 GER_the_northern_shield: "Kuzey Kalkanı"
 GER_the_northern_shield_desc: "İskandinav ülkeleri kaynak bakımından zengindir ancak işçilerini sendikalaştırma çabalarına rağmen proletarya hala kapitalist çıkarların altında acı çekmektedir. Sadece işçilerin daha iyisini hak ettiğine değil, aynı zamanda bu kaynakları çok daha iyi kullanabileceğimize de inanıyoruz. İskandinav işçilerinin sömürüsü sona ermelidir!"
 GER_sign_the_second_treaty_of_berlin: "İkinci Berlin Antlaşmasını İmzala"
 GER_sign_the_second_treaty_of_berlin_desc: "Büyük ordumuzun farkındayız, ancak [SOV.GetNameDef]'in de çatışmak istemediğimiz bir ordusu olduğunun aynı derecede farkındayız. Ulaşarak ve düşmanlıklardan kaçınmak için aynı sayfada olduğumuzdan emin olarak, ilgili ülkelerimizdeki tüm işçiler için daha iyi bir gelecek sağlayabiliriz."
 GER_defense_treaty_with_the_soviet: "Sovyet ile Savunma Antlaşması"
 GER_defense_treaty_with_the_soviet_desc: "[SOV.GetAdjective]'lerle düşmanlıklara girmeme konusunda anlaştığımıza göre, diplomatik ilişkiyi bir adım daha ileri götürmeyi düşünmeliyiz. Onları korumamıza layık görüyoruz ve onların da aynı şekilde hissedeceklerini ve karşılıklı bir savunma antlaşmasının bizim çıkarlarımız kadar onların da çıkarına olacağını varsayıyoruz."
 GER_industrial_cooperation: "Endüstriyel İşbirliği"
 GER_industrial_cooperation_desc: "[SOV.GetAdjective]'lerle işbirliğimiz şimdiye kadar askeri konularla sınırlı kalmıştır. [SOV.GetNameDef]'in bizim bir müttefikimiz olduğu göz önüne alındığında, başka alanlarda da işbirliği yapmamız mantıklı olacaktır. Endüstriyel felsefelerimiz zaten yeterince benzer olduğundan, endüstriyel sektördeki ortak çabaları başarmak zor olmamalıdır."
 GER_tech_sharing: "Endüstriyel Teknoloji Paylaşımı"
 GER_tech_sharing_desc: "Bizimle ve diğer benzer düşünen ülkeler arasında teknoloji paylaşımı, çabalamamız gereken bir şey olmalıdır. Bu girişim için [SOV.GetAdjective]'lere ulaşmak en mantıklı hareket tarzı gibi görünüyor."
 GER_resource_trade: "Kaynak Ticareti"
 GER_resource_trade_desc: "Kendimizi olabildiğince desteklemeye çalışsak da, ideallerimizi paylaşan ülkelerle ticaret yapmamıza izin vermeliyiz. [SOV.GetNameDef]'e endüstriyel kapasite şeklinde bir miktar tazminat sunarak, kendimize onlarla çok faydalı bir anlaşma sağlayabilmeliyiz."
 GER_factories_for_resources: "Kaynaklar İçin Fabrikalar"
 GER_factories_for_resources_desc: "[ROOT.GetNameDef]'de daha iyi kullanılabilecek bol miktarda sivil sanayimiz var. [SOV.GetNameDef]'in bazı bölgelerde oldukça az gelişmiş olduğunun farkındayız, tesadüfen söz konusu bölgeler genellikle değerli kaynaklar açısından da zengindir. Bu kaynakların bir kısmı karşılığında bazı sanayileri yer değiştirme teklifi bizim için kazançlı bir fırsat olabilir."
 GER_factories_for_resources_tt: "Sanayileri kaynaklar karşılığında §Y[SOV.GetNameWithFlag]§!'a taşıma §YKararlarının§! kilidini açar."

 #NON-ALIGNED/DEMOCRATIC
 GER_monarchist_sentiment: "Monarşist Duygu"
 GER_monarchist_sentiment_desc: "Halk bir monarşi istiyor ve istediklerini alacaklar. Hükümetin belirli biçimi henüz kararlaştırılmamış olsa da, Alman halkının Kayzerlerine geri dönmesi gerektiği açıktır."
 GER_the_monarchy_compromise_ww: "$GER_the_monarchy_compromise$"
 GER_the_monarchy_compromise_ww_desc: "$GER_the_monarchy_compromise_desc$"
 GER_re_establish_free_elections_ww: "$GER_reestablish_free_elections$"
 GER_re_establish_free_elections_ww_desc: "$GER_reestablish_free_elections_desc$"
 GER_re_ratify_the_locarno_treaty: "Locarno Antlaşmasını Yeniden Onayla"
 GER_re_ratify_the_locarno_treaty_desc: "Locarno Antlaşmaları 1925'te imzalandı, bu antlaşmalarla İtilaf Devletleri Avrupa'da toprak bütünlüğünü güvence altına alırken bizimle ilişkileri normalleştirmeye çalıştı. Bize karşı baskıcı olarak görülse de, Hitler'in buna karşı çıkma hatasını geri almanın en iyisi olduğu açıktır."
 GER_re_ratify_the_locarno_treaty_tt: "§Y[FRA.GetNameDefCap]§!, attığımız herhangi bir diplomatik adımı kabul etmeye daha yatkın olacaktır"
 GER_franco_germanic_pact: "Fransız-Alman Paktı"
 GER_franco_germanic_pact_desc: "[FRA.GetAdjective] ile ilişkilerimizin yakın zamanda normalleşmesiyle, ilişkimizi derinleştirmek ve Doğu'daki [SOV.GetAdjective]'lere karşı birlikte durabilmemiz için bir dostluk ve karşılıklı yardım paktını resmileştirmek akıllıca olacaktır."
 GER_request_the_return_of_french_held_colonies: "Fransız Kontrolündeki Sömürgelerin İadesini Talep Et"
 GER_request_the_return_of_french_held_colonies_desc: "Büyük Savaş'ın sonunda sömürge mülklerimizden mahrum bırakıldık. Alman Sömürge Cemiyeti'nin Adenauer yönetiminde yeniden popülerlik kazanmasıyla, eski sömürgelerimiz Kamerun ve Togoland'ı geri isteme zamanı gelmiş olabilir. Fransa ile ilişkimiz ne kadar iyi olursa, bölgeyi geri almamıza izin verme olasılıkları o kadar yüksek olur."
 GER_offer_trade_proposal: "Ticaret Teklifi Sun"
 GER_offer_trade_proposal_desc: "Bol miktarda doğal kaynağa sahip birçok devlet var ve bunlarla ticaret yapmak son derece karlı olacaktır. Endonezya ve Kongo toprakları kauçuk ve nadir metaller açısından zengindir, bu nedenle [BEL.GetNameDEF] ve [HOL.GetNameDef] ile ticaret anlaşmaları yapmak, sanayilerimizi beslemek için sömürgelerinin zengin kaynaklarını elde etmemizi sağlayacaktır."
 GER_reverse_the_brain_drain_ww: "$GER_reverse_the_brain_drain$"
 GER_reverse_the_brain_drain_ww_desc: "$GER_reverse_the_brain_drain_desc$"
 GER_shared_rd_programs_ww: "$GER_shared_rd_programs$"
 GER_shared_rd_programs_ww_desc: "$GER_shared_rd_programs_desc$"
 GER_shared_rd_programs_ww_tt: "§Y$GER_rnd_programs_modifier$§!'den gelen araştırma hızı bonusu, her yeni grup üyesi için §G%1§! artar, en fazla §G%10§!'a kadar!"
 GER_shared_rd_programs_2_tt: "§YGrup§! içindeki her §YUlus§! da §YOrta Avrupa Araştırma§! paylaşım grubuna katılacaktır."
 GER_pool_technical_know_how_ww: "$GER_pool_technical_know_how$"
 GER_pool_technical_know_how_ww_desc: "$GER_pool_technical_know_how_desc$"
 GER_the_mannheim_project_ww: "Mannheim Projesi"
 GER_the_mannheim_project_ww_desc: "Atomun sırlarını çözme çabalarımızı iki katına çıkarmalı ve onu [SOV.GetAdjective]'lere karşı silahlandırmaya bakmalıyız. Bu, yeni müttefiklerimiz sayesinde daha kolay olacaktır, çünkü onlar bu konuda sahip oldukları herhangi bir bilgiyi paylaşmaya istekli olabilirler."
 GER_ban_political_uniforms: "Siyasi Üniformaları Yasakla"
 GER_ban_political_uniforms_desc: "Weimar dönemi, paramiliter örgütler ve siyasi grupların mücadelelerini sokaklarımıza taşımasıyla gölgelendi. Gelecek için istikrarı sağlamak amacıyla, bu açık siyasi bağlılık gösterilerini yasaklamalıyız."
 GER_embrace_liberal_leanings: "Liberal Eğilimleri Benimse"
 GER_embrace_liberal_leanings_desc: "Muhafazakarlık, Kayzerimizin savaşın sonunda politikacılarımızın yapabildiğini yapamadığında modası geçmiş olduğunu kanıtladı. Her zaman ileriye bakmalı ve daha iyi bir yarın için çabalamalıyız!"
 GER_strive_for_conservative_values: "Muhafazakar Değerler İçin Çabala"
 GER_strive_for_conservative_values_desc: "Liberal fikirler ulusumuzda çok uzun süredir yaygınlaştı, adamlarımızın zihinlerini zayıflattı ve politikacılarımızı yozlaştırdı. Weimar Cumhuriyeti'nin kaosunun bir daha asla geri dönmemesi için eski güzel değerlerimize geri dönmeliyiz."
 GER_strengthen_the_welfare_state: "Refah Devletini Güçlendir"
 GER_strengthen_the_welfare_state_desc: "Ulusumuzun bir refah devleti olarak uzun bir geçmişi var ve bunu şimdi değiştirme niyetinde değiliz. İlkelerimize sadık kalmalı ve halkımızın mümkün olan en iyi hayatları yaşamasını sağlamalıyız."
 GER_democratic_shield: "Demokratik Kalkan"
 GER_democratic_shield_desc: "Demokrasi, bir zamanlar bizim ulusumuzda olduğu gibi, dünyanın her yerinde tehlikede. Otoriter ve totaliter popülistlerin dehşetini biliyoruz ve diğer ulusların halklarının bizim bir zamanlar yaşadıklarımızı yaşamak zorunda kalmamasını sağlamalıyız."
 GER_send_military_support_democratic_shield_tt: "Savaştaki §YDemokratik§! ülkelere §YAskeri Ekipman Gönderme§! kararlarının kilidini açar"
 GER_revive_the_kaiserreich_ww: "$GER_revive_the_kaiserreich$"
 GER_revive_the_kaiserreich_ww_desc: "$GER_revive_the_kaiserreich_desc$"
 GER_return_of_the_kaiser_ww: "Kayzer'in Dönüşü"
 GER_return_of_the_kaiser_ww_desc: "Kaiserreich'ın bir Kayzer'e ihtiyacı var ve II. Wilhelm hala yaşıyor, Hollanda'da sürgünde. Batı Demokrasilerinin ne düşündüğüne bakılmaksızın, sürgününü kaldıracak ve tahta geçmesi için geri dönmeye davet edeceğiz."
 GER_military_dictatorship: "Askeri Diktatörlük"
 GER_military_dictatorship_desc: "Büyük Savaş bize, ulusumuzu mümkün olan en iyi yöne yönlendirmek için tek başına Kayzer'in yeterli olmadığını kanıtladı. O zamanlar yapıldığı gibi, yeni Yüksek Ordu Komutanlığı bir kez daha diktatörlük yetkilerini üstlenmeli ve İmparatorluktaki tek siyasi otorite haline gelmelidir."
 GER_military_dictatorship_tt: "§YAlman İmparatorluğu§!, §YAlman Kaiserreich§! olarak bilinecektir.\n"
 GER_invite_scientists_back: "İmparatorluk Bilim Girişimi"
 GER_invite_scientists_back_desc: "Naziler iktidara geldiğinde birçok parlak zihin ülkeden kaçtı ve iyi bir nedenle. Ancak şimdi şanlı İmparatorluğumuz restore edildiğine göre, birçoğu bize bir kez daha geri dönmeye istekli olabilir."
 GER_glorious_mechanical_machinations: "Görkemli Mekanik Entrikalar"
 GER_glorious_mechanical_machinations_desc: "Kayzerimiz uzun süredir büyük makinelere hayranlık duyuyor ve bilim adamlarımıza, devasa demiryolu topları, Atlantik'i geçebilen uçaklar ve siluetleri ufukları kaplayan gemiler gibi daha önce sadece rüyalarda görülen icatların araştırılmasına öncelik vermelerini emretti."
 GER_prussian_artillery: "Prusya Topçu Doktrini"
 GER_prussian_artillery_desc: "Eskiden üstün doktrinlerimizi kullanarak savaştan savaşa zafer kazanmayı başardık. Kalite ve ateş gücü, onu bu kadar başarılı bir taktik yapan şeyin büyük bir parçasıdır ve bir kez daha taklit etmeye çalışmamız gereken bir şeydir!"
 GER_fan_prussian_militarism: "$GER_fan_the_prussian_militarism$"
 GER_fan_prussian_militarism_desc: "$GER_fan_the_prussian_militarism_desc$"
 GER_fan_prussian_militarism_tt: "§YRupprecht von Wittelsbach§!'ı seviye 4 Mareşal olarak açar"
 GER_re_form_the_freikorps: "Freikorps'u Yeniden Kur"
 GER_re_form_the_freikorps_desc: "Freikorps, ideolojik rakiplerimize karşı mücadelemizde bize uzun süredir yardım etti, Weimar dönemi boyunca Bavyera Sovyet Cumhuriyeti'ni ve diğer devrim girişimlerini bastırmamıza yardımcı oldu. Ne komünistlerin ne de Nazilerin ulusumuzda yeniden bir yer edinememesi için böyle bir paramiliter gücü yeniden kurmaya çalışmalıyız."
 GER_freikrops_militia_recruitment_tt: "Beş Freikorps §YMilis§! birimi kazan"
 GER_re_form_the_freikorps_generals_tt: "§YFranz Ritter von Epp§! ve §YHermann Erhardt§! general olarak kullanılabilir hale gelir"
 GER_re_establish_the_landwehr: "Landeswehr'i Yeniden Kur"
 GER_re_establish_the_landwehr_desc: "Landwehr, 1813'ten beri faydalı bir öz savunma aracı olmuştur ve Weimar Cumhuriyeti için çok faydalı olmuştur. Ulusumuzun adamlarını da faydalı hale getirmeye ve kendi Landwehr ve Landesschützen taburlarımızı kurmaya çalışmalıyız."
 GER_all_for_the_front: "Her Şey Cephe İçin!"
 GER_all_for_the_front_desc: "Her adam, vatanının eski ihtişamını geri kazanmasını istiyorsa kalbini, kanını ve ruhunu Alman ulusuna vermelidir. Yaptığımız her şey cephe için olmalı ve bu, halkımızın zamanla anlaması gereken bir gerçektir."
 GER_expatriate_the_communists_ww: "$GER_expatriate_the_communists$"
 GER_expatriate_the_communists_ww_desc: "$GER_expatriate_the_communists_desc$"
 GER_demand_the_return_of_southern_jutland: "Güney Jutland'ın İadesini Talep Et"
 GER_demand_the_return_of_southern_jutland_desc: "Schleswig Dükalığı'nın mülkiyeti uzun süredir bizimle Danimarkalılar arasında çekişmeli bir konu olmuştur. Büyük Savaş'ın sonunda, savaşa katılmamış olmalarına rağmen, İtilaf Devletleri Kuzey Schleswig'i onlara verdi. Bu tarihi adaletsizliği geri almalı ve Danimarka hükümetinden onu bize geri vermesini talep etmeliyiz."
 GER_glory_to_the_imperial_army: "İmparatorluk Ordusuna Şan Olsun"
 GER_glory_to_the_imperial_army_desc: "İmparatorluk ordusu savaştan savaşa zafer kazandı ve Prusya ile Almanya'nın Avrupa'daki yerini sağlamlaştırdı. Ancak, Weltkrieg'in sonunda politikacıların ihanetine rağmen, ordu kaybettiği ihtişamını geri kazanabilecektir."
 GER_glory_to_the_imperial_army_tt: "§YPrens Eitel Friedrich§!'i seviye 2 General olarak açar"
 GER_restore_the_holy_roman_empire: "Kutsal Roma İmparatorluğunu Restore Et"
 GER_restore_the_holy_roman_empire_desc: "Birçoğu böyle bir günün geleceğinden şüphe duyuyordu, ama işte buradayız. İmparatorluğun eski sınırları geri kazanıldığına göre, bir kez daha Kutsal Roma İmparatorluğu'nun bir imparatorunu taçlandırabiliriz, ancak bu sefer birleşik bir ulus şeklinde. İmparatorluğa şan olsun!"
 GER_weltpolitik: "Weltpolitik"
 GER_weltpolitik_desc: "Küresel imparatorluğumuzu restore edene veya onun yerine yeni bir tane inşa edene kadar büyük bir güç olarak ciddiye alınmayacağız. Bu nedenle dışarıya bakmaya başlamalı ve gözlerimizi artık sadece Avrupa kıtasına odaklamamalıyız."
 GER_prepare_for_the_next_naval_blockade: "Bir Sonraki Deniz Ablukasına Hazırlan"
 GER_prepare_for_the_next_naval_blockade_desc: "Bizden daha büyük bir filoya sahip düşmanlara karşı savaştığımızda en son ne olduğunu biliyoruz. Şimdi sahip olduğumuz bilgiler sayesinde, savaş gelmeden önce dikkatli hazırlıklar yaparak bir zamanlar karşılaştığımız sorunların çoğunu aşmaya çalışabiliriz."
 GER_accept_british_naval_dominance_ww: "$GER_accept_british_naval_dominance$"
 GER_accept_british_naval_dominance_ww_desc: "$GER_accept_british_naval_dominance_desc$"
 GER_carve_up_congo: "Kongo'yu Paylaş"
 GER_carve_up_congo_desc: "Kongo sömürgeleştirilmeye hazır ve doğal kaynaklar açısından bol. Belki de İngiliz yatıştırmacılarıyla bu geniş bölgeyi aramızda paylaşmak için bir anlaşma bulabiliriz, sömürge imparatorluğumuzu yeniden kurma çabalarımızda büyük bir atlama taşı olarak."
 GER_anglo_germanic_defense_pact: "Anglo-Alman Savunma Paktı"
 GER_anglo_germanic_defense_pact_desc: "İngilizler uzun süredir düşmanımızdı, ancak son gelişmelerle, eğer birimize saldırılırsa ikimize de saldırılmış sayılacağını belirten bir savunma anlaşması yapabiliriz. Bu, onlarla ilişkilerin normalleşmesinde büyük bir adım olacaktır."
 GER_signed_the_anglo_german_defence_pact_opm: "Anglo-Alman Savunma Paktı İmzalandı"
 GER_anglo_germanic_cooperation_program: "Anglo-Alman İşbirliği Programı"
 GER_anglo_germanic_cooperation_program_desc: "Kraliyet Donanması, gemi yapımı ve deniz savaşı konusunda engin bilgiye sahiptir. Yakın işbirliğimiz sayesinde, İngilizlerin daha önce sıkı sıkıya korunan bir sır olarak sakladığı bilgileri edinebilir ve bunlardan yararlanabiliriz."
 GER_carte_blanche_for_alsace_and_french_colonies_ww: "$GER_carte_blanche_for_alsace_and_french_colonies$"
 GER_carte_blanche_for_alsace_and_french_colonies_ww_desc: "$GER_carte_blanche_for_alsace_and_french_colonies_desc$"
 GER_petition_for_the_return_of_old_colonies: "Eski Sömürgelerin İadesi İçin Dilekçe Ver"
 GER_petition_for_the_return_of_old_colonies_desc: "Yeni İngiliz dostlarımız, Büyük Savaş'ın sonunda devraldıkları sömürgelerimizin iadesini tartışmaya açık olabilirler. Bir tür tazminat talep edebilirler, ancak eski iddialarımızın restorasyonu anlamına gelebilirse bunu yapmaya istekli oluruz."
 GER_unify_west_africa: "Güneybatı Afrika'yı Birleştir"
 GER_unify_west_africa_desc: "Mittelafrika hayallerimiz şu anda Angola bölgesinin varlığı tarafından engelleniyor. Güneybatı Afrika'daki topraklarımızı Kongo'daki varlıklarımızla birleştirmek için, bölge üzerindeki yönetimimizin derhal tanınmasını talep eden bir ültimatom göndermeliyiz."
 GER_expand_pacific_holdings: "Pasifik Varlıklarını Genişlet"
 GER_expand_pacific_holdings_desc: "Pasifik Okyanusu'nda bir imparatorluk için kanlı bir dişle, politikacılarımız bölge genelinde erişimimizi genişletmeyi savunuyorlar, uzak doğuda [ROOT.GetAdjective] hegemonyası kurma hedefiyle. Bu girişimi desteklemeli ve saldırıya geçmeliyiz."
 GER_closer_sino_germanic_relations: "Daha Yakın Çin-Alman İlişkileri"
 GER_closer_sino_germanic_relations_desc: "[CHI.GetAdjective]'ler uzun süredir müttefikimizdi, birçoğu [CHI.GetAdjective] hükümetinin o zamanlar Büyük Savaş'a bizim tarafımızda girme olasılığını görüyordu. Onlarla ilişkimize değer vermeli ve uluslarımız arasındaki bağı güçlendirmeye çalışmalıyız."
 CHI_has_accepted_german_overtures: "Çin, [ROOT.GetAdjective] Yaklaşımlarını Kabul Etti"
 GER_industrial_investments: "Endüstriyel Yatırımlar"
 GER_industrial_investments_desc: "[CHI.GetNameDefCap] çok az gelişmiştir ve dünya sahnesinde büyük bir güç olarak düzgün bir şekilde durmak için ihtiyaç duyacağı sanayileşmeden yoksundur. Sanayileşmelerine yardımcı olmak için mühendisler göndermeli ve endüstriyel büyümelerine yardımcı olmak amacıyla gelecek vaat eden [CHI.GetAdjective] şirketlerini finanse etmeliyiz."
 GER_launch_sino_germanic_joint_research_program: "Çin-Alman Ortak Araştırma Programı Başlat"
 GER_launch_sino_germanic_joint_research_program_desc: "[CHI.GetAdjective]'ler bilmek değerli olacak bilgilere sahipler ve biz de onlar için faydalı olacak çok şey biliyoruz. Bu nedenle, her iki ulusumuzun da işbirliği içinde ilerlemesine yardımcı olabilecek ortak bir araştırma ve geliştirme ekibi kurmaya çalışmalıyız."
 GER_send_military_aid: "Askeri Yardım Gönder"
 GER_send_military_aid_desc: "[CHI.GetNameDef]'deki dostlarımız düşmanlarla çevrilidir, birçoğu devletlerinin varlığını tehdit etmeye çalışmaktadır. Onlara mühimmat ve teçhizat göndermeliyiz, böylece sınırlarını güvence altına alabilir ve gelecek yıllarda bize faydalı olabilirler."
 GER_send_volunteers: "Uzak Doğu Lejyonu"
 GER_send_volunteers_desc: "Birçok [ROOT.GetAdjective], macera özlemi çekiyor ve iyi bir amaç için savaşmak istiyor. Bu nedenle, [CHI.GetAdjective] dostlarımıza savaşlarında yardım etmek üzere gidecek bir 'gönüllü' lejyonu kurmalıyız."
 GER_request_the_return_of_qingdao: "Qingdao'nun İadesini Talep Et"
 GER_request_the_return_of_qingdao_desc: "Tsingtao, aşağılanma yüzyılları boyunca Çin'den elde edilen birçok antlaşma limanından biriydi. Büyük Savaş'ın sonunda şehri kaybetmiş olsak da, yıllar önce bize devredilen bir şehir, şimdi doğru tazminatlar hazırsa [CHI.GetNameDef]'den geri isteme fırsatını bulabiliriz."
 GER_the_sino_germanic_pact: "Çin-Alman Paktı"
 GER_the_sino_germanic_pact_desc: "Sonunda [CHI.GetAdjective] hükümetini resmen bir müttefik olarak tanıma zamanı geldi. Bu ittifakı derhal resmileştirmeliyiz, böylece bizi ezmeye çalışan herkese karşı birlikte durabiliriz!"
 GER_divide_and_conquer: "Böl ve Fethet"
 GER_divide_and_conquer_desc: "Biz ve [CHI.GetAdjective]'ler uzak doğuda istediğimiz nüfuz alanlarına sahibiz ve bir noktada sınırlar çizilmeli ve saygı gösterilmelidir. Bu nedenle bunu en kısa sürede yapmalıyız, böylece her iki emperyal hayalimiz de tanınabilir."
 GER_asian_spheres_of_influence_tt: "Biz ve §Y[CHI.GetNameWithFlag]§!, §YAsya§!'daki Nüfuz Alanlarımızı kuracağız, birbirimizin ilgili alanları içindeki ve dışındaki eyaletleri almanın maliyetini değiştireceğiz.\n\nBizim §YNüfuz Alanımız§! şunları içerecektir:\n§Y[MAL.GetNameWithFlag]§!\n§Y[INS.GetNameWithFlag]§!\n§Y[PHI.GetNameWithFlag]§!\n§Y[AST.GetNameWithFlag]§!\n§Y[NZL.GetNameWithFlag]§!\nTüm §YGüney Pasifik Adaları§!\n\nOnların §YNüfuz Alanı şunları içerecektir§!:\n§Y[SIA.GetNameWithFlag]\n[VIN.GetNameWithFlag]\n[CAM.GetNameWithFlag]\n[LAO.GetNameWithFlag]\n[CHI.GetNameWithFlag]\n[RAJ.GetNameWithFlag]\n[TIB.GetNameWithFlag]\n[NEP.GetNameWithFlag]\n[BHU.GetNameWithFlag]\n[KOR.GetNameWithFlag]\n[JAP.GetNameWithFlag]\n[MON.GetNameWithFlag]§!"
 GER_the_second_naval_race: "İkinci Deniz Yarışı"
 GER_the_second_naval_race_desc: "İngilizler ve Fransızlar tarafından çok uzun süredir aşağılandık! Filolarımızı restore etme ve artık onlara boyun eğme niyetinde olmadığımızı resmen ilan etme zamanı geldi. Yakında, denizlerin bize ait olduğunu ve başka kimseye ait olmadığını anlayacaklar."
 GER_rebuild_the_high_seas_fleet_ww: "$GER_rebuild_the_high_seas_fleet$"
 GER_rebuild_the_high_seas_fleet_ww_desc: "$GER_rebuild_the_high_seas_fleet_desc$"
 GER_break_anglo_french_colonial_hegemony_ww: "$GER_break_the_anglo_french_colonial_hegemony$"
 GER_break_anglo_french_colonial_hegemony_ww_desc: "$GER_break_the_anglo_french_colonial_hegemony_desc$"
 GER_break_anglo_french_colonial_hegemony_ww_tt: "§YFransa§! ile karşılıklı işbirliği anlaşması imzaladıysak, onlara karşı bir savaş hedefi kazanmayacağız"
 GER_asian_allies: "Asyalı Müttefikler"
 GER_asian_allies_desc: "Asya'da düşmanlarımızın kontrolü altına girmemiş birçok küçük ulus var. Belki güvenli bir gelecek ve toprak kazanımları vaatleriyle, küresel çatışmamızda bize yardım etmeye istekli olurlar."
 GER_our_place_in_the_sun_ww: "Güneşteki Yerimiz"
 GER_our_place_in_the_sun_ww_desc: "[ROOT.GetNameDef]'in güneşteki yerini alma hakkını bir kez daha ileri sürdüğünü herkes bilsin! Halkımız artık gölgelerde, güneşin batmadığı İmparatorluğun boyunduruğu altında aşağılanmayacak!"
 GER_realize_mittelafrika: "Mittelafrika'yı Gerçekleştir"
 GER_realize_mittelafrika_desc: "Sömürge imparatorluğumuz uzaklara ve geniş alanlara ulaşacak ve orta Afrika'nın zenginlikleri her zaman çekici olmuştur. Afrika'nın kalbini kullanabilmemiz için Alman Mittelafrika hayallerimizi en kısa sürede gerçekleştirmeliyiz."
 GER_realize_mittelafrika_tt: "Tüm §YKongo§!, §YKenya§!, §YAngola§! ve §YMozambik§! eyaletleri üzerinde hak iddia eder."
 GER_african_allies: "Afrikalı Müttefikler"
 GER_african_allies_desc: "Afrika halkı Avrupalılardan kurtulmayı özlüyor. Belki de bize katılırlarsa özerklik vaatleriyle onları kendi tarafımıza çekebiliriz."
 GER_african_allies_tt: "§YAfrikalı§! ülkelerin §YBağımsızlığını Destekleme§! kararlarının kilidini açar"
 GER_asian_allies_faction_tt: "Şu anda bir grupta olmayan Bağımsız Asyalı Azınlıklar şu olayı alır:"
 GER_african_allies_faction_tt: "Şu anda bir grupta olmayan Bağımsız Afrikalı Azınlıklar şu olayı alır:"
 GER_asian_allies_tt: "§YAsyalı§! ülkelerin §YBağımsızlığını Destekleme§! kararlarının kilidini açar"
 GER_expand_african_reach: "Afrika Erişimini Genişlet"
 GER_expand_african_reach_desc: "Afrika'da hak iddia ettiğimiz ancak mevcut düşmanlarımızın kontrolü altında olmayan bölgeler var. İddialarımızın netleştirildiğinden emin olmalı ve bu bölgeleri onlardan derhal talep etmeliyiz."

 GER_realpolitik: "Realpolitik"
 GER_realpolitik_desc: "Avrupa'nın geri kalanına dışarıdan bakma ve rüzgarların ne yönde estiğini görme zamanı geldi. İttifak veya fetih fırsatları ortaya çıkarsa, onları derhal ele geçirdiğimizden emin olmalıyız."

 GER_restore_the_brest_litovsk_borders: "Brest-Litovsk Sınırlarını Restore Et"
 GER_restore_the_brest_litovsk_borders_desc: "Brest-Litovsk antlaşmasında kurulan sınırlar, Rusların Büyük Savaş'ı kaybetmesine ve toprakları bize devretmesine rağmen, Versay antlaşması tarafından uzun süredir yasa dışı olarak yürürlükten kaldırılmıştır. Gelecekte savaşa yol açabilecek olsa bile, kaybettiğimiz doğu mülklerimizi geri kazanmak için çabalamalıyız."
 GER_demand_further_polish_concessions: "Daha Fazla Polonya Tavizi Talep Et"
 GER_demand_further_polish_concessions_desc: "Polonyalıları eski İmparatorluğun ayrılmaz parçalarını bize geri vermeye ikna ettik, ama orada durmayacağız. Brest-Litovsk sınırları henüz restore edilmedi ve Polonya hala hayallerimizi gerçekleştirmemizin önünde duruyor."
 GER_restore_eastern_imperial_possessions: "Doğu İmparatorluk Mülklerini Restore Et"
 GER_restore_eastern_imperial_possessions_desc: "İmparatorluğumuz için ayrılmaz olan topraklar şu anda yabancı güçler tarafından bizden alıkonuluyor. Brest-Litovsk sınırlarını gerçekleştirmek için önce Poznan, Batı Prusya ve Silezya'ya bakmalıyız."
 GER_incorporate_the_polish_rump_state: "Polonya Kalan Devletini Dahil Et"
 GER_incorporate_the_polish_rump_state_desc: "Polonya'nın kalan son parçaları bile, Brest-Litovsk antlaşmasında belirtildiği gibi imparatorluğa aittir. Gerekirse zorla bu bölgeleri geri almalıyız."

 GER_memel_ultimatum: "Memel Ültimatomu"
 GER_memel_ultimatum_desc: "Büyük Savaş'tan bir şey öğrendiysek, o da dıştaki doğu mülklerimize yönelik bir saldırıya hazırlanmamız gerektiğidir. Bu mülkler restore edilmeli ve işgale karşı güçlendirilmelidir. Ancak bu, geri almak zorunda kalacağımız stratejik olarak önemli Memelland'ın kontrolü olmadan yapılamaz."
 GER_demand_lithuanian_integration: "Litvanya Entegrasyonunu Talep Et"
 GER_demand_lithuanian_integration_desc: "Litvanya krallığı bir zamanlar ulusumuzun yarı özerk bir parçası olarak planlanmıştı ve öyle olacak. Litvanya topraklarının ilhakını aramalı ve Mindaugas'ı bölgelerin Dükü olarak taçlandırmalıyız."

 GER_establish_eastern_grand_duchies: "[GetEasternDuchiesName]"
 GER_establish_eastern_grand_duchies_desc: "Antlaşmada kapsanan tüm topraklar doğrudan bizim tarafımızdan tutulamaz. Ancak doğuda bu toprakları bizim için tutabilecek Büyük Dükalıklar ve Uydu Krallıklar için planlarımız var."
 GER_eastern_duchies_name_democratic: "Doğu Özerk Devletleri"
 GER_eastern_duchies_name_neutrality: "Doğu Büyük Dükalıklarını Kur"

 GER_subduing_the_baltic_states: "Baltık Devletlerini Boyunduruk Altına Alma"
 GER_subduing_the_baltic_states_desc: "Baltık devletleri gayrimeşrudur, Birleşik Baltık Dükalığımızın topraklarını talep etmektedirler. Onları boyunduruk altına almalı ve toprakları Baltık-Alman aristokrasisine teslim etmeliyiz."
 GER_subduing_the_baltic_states_tt: "Üç Baltische Landeswehr §YPiyade§! birimi kazan.\nEğer §YPolonya§! §YBermontları Restore Etmediyse§!, §YRüdiger von der Goltz§! seviye 3 Mareşal olarak bize katılacaktır."

 GER_strike_eastward: "Doğuya Saldır"
 GER_strike_eastward_desc: "Sınırlar güvence altına alındığına göre, en büyük rakibimizi, Brest-Litovsk antlaşmasını bozanı ve Doğu Avrupa'nın istikrarını tehdit edeni, yani [SOV.GetNameDef]'i vurma zamanı geldi. Moskova'yı ele geçirme ve [SOV.GetAdjective] devini gerçekten dizlerinin üzerine çökertme zamanı geldi."
 GER_unlocks_kremlin_raid_tt: "§Y[SOV.GetNameWithFlag]§! ile savaş halindeyken §YKremline§! §YHava Saldırısı§!'nın kilidini açar!"

 GER_end_european_communism: "Avrupa Komünizmine Son Ver"
 GER_end_european_communism_desc: "Ulusumuza yönelik en büyük tehdit yok edildiğine göre, Avrupa'da bıraktıkları karışıklığı temizleme zamanı geldi. Komünizm değerlerimize temel bir tehdittir ve iyilik için söndürülmelidir."
 GER_strike_eastward_eq_trigger_tt: "Orduda §Y100.000§!'den fazla piyade ekipmanı"
 GER_second_vienna_award_eq_trigger_tt: "Orduda §Y60.000§!'den fazla piyade ekipmanı"
 GER_sea_lion_eq_trigger_tt: "Orduda §Y90.000§!'den fazla piyade ekipmanı"
 GER_puppet_finland: "[FIN.GetAdjective] Sadakatini Sağla"
 GER_puppet_finland_desc: "[GetFinlandpuppetDescription]"
 GER_finland_puppet_description_democratic: "[FIN.GetAdjective] halkı silah arkadaşlarımız olabilir, ancak bize ihanet edip taraf değiştirecekleri bir günün gelip gelmeyeceğinden asla emin olamayız. Böyle bir günün asla gelmemesini sağlamalıyız, bedeli ne olursa olsun!"
 GER_finland_puppet_description_neutrality: "[FIN.GetAdjective] halkı geçmişte bir kral atama teklifimizi reddetti, ancak bir daha yapmalarına izin vermeyeceğiz. Hesse Prensi Wolfgang'ın tahtlarına geçme zamanı geldi, isteseler de istemeseler de."
 GER_see_to_the_eastern_front_ww: "Doğu Cephesiyle İlgilen"
 GER_see_to_the_eastern_front_ww_desc: "Önceki savaştaki eylemlerimiz hala birçoklarının hafızasında tazedir. Kıtanın korkularını gerçek tehlikeye yeniden odaklamalıyız: Doğu'da beliren büyük [GER.GetGreatRedMenaceDesc]. Kıtanın gözlerini açmak için büyük bir propaganda kampanyası başlatacağız."
 GER_the_eastern_threat: "Doğu Tehdidi"
 guardian_against_the_eastern_threat: "Doğu Tehdidine Karşı Muhafız"
 existential_threat: "Varoluşsal Tehdit"
 GER_seeks_to_restore_brest_litovsk: "Brest-Litovsk'u restore etmeye çalışıyor"
 GER_seeks_to_restore_brest_litovsk_worse: "$GER_seeks_to_restore_brest_litovsk$"
 GER_safeguard_the_baltic_ww: "$GER_safeguard_the_baltic$"
 GER_safeguard_the_baltic_ww_desc: "$GER_safeguard_the_baltic_desc$"
 GER_tributes_for_guarantees: "Garantiler İçin Haraçlar"
 GER_tributes_for_guarantees_desc: "Baltık devletlerini doğudaki Ayı'dan korumalıyız, ancak bunu bedavaya yapmayacağız. Bu uluslar bu kadar savunmasız bir konumda olduklarından, koruma karşılığında tazminat talep etmek kolay olacaktır."
 tributes_from_lithuania_tt: "Eğer §Y[LIT.GetNameWithFlag]§! Kabul Ederse:"
 tributes_from_latvia_or_estonia_tt: "Eğer §Y[LAT.GetNameWithFlag]§! veya §Y[EST.GetNameWithFlag]§! Kabul Ederse:"
 GER_will_also_recieve_trade_and_civs_tt: "Ayrıca kaynaklarının ve sivil sanayilerinin küçük bir kısmını alacağız. \n §Y$MODIFIER_CONSUMER_GOODS_FACTOR$§! miktarı, taleplerimizi kaç ulusun kabul ettiğine bağlı olacaktır"
 GER_support_the_finns_ww: "$GER_support_the_finns$"
 GER_support_the_finns_ww_desc: "Finliler kendilerini [GER.GetRussiansDemonym]'in ateş hattında buluyorlar. Onlara doğu tehdidine karşı bir garanti sunacak ve mütevazı bir endüstriyel yardım vereceğiz."
 GER_danzig_for_guarantees_ww: "$GER_danzig_for_guarantees$"
 GER_danzig_for_guarantees_ww_desc: "$GER_danzig_for_guarantees_desc$"
 GER_safeguard_poland: "Polonya'yı Koru"
 GER_safeguard_poland_desc: "Polonyalılar doğudan saldırıya karşı savunmasızdır. Onları ne pahasına olursa olsun korumalıyız, böylece bizimle [SOV.GetAdjective]'ler arasında bir tampon devlet tutabiliriz."
 GER_safeguard_poland_tt: "Eğer §YPolonya§!, §YOrtak Askeri Tatbikatlar Düzenle§! tamamlandığında ya grubumuzda ya da tarafımızdan garanti altındaysa, ek olarak §G25§! §YOrdu Deneyimi§! ve §G15§! §YHava Deneyimi§! kazanacağız!"
 GER_offer_military_production_support: "Askeri Üretim Desteği Sun"
 GER_offer_military_production_support_desc: "Doğu tampon devletleri bizim sahip olduğumuz güçlü endüstriyel güç tabanından yoksundur. [SOV.GetNameDef] tarafından saldırıya uğrarlarsa bir süre kendi başlarına dayanabilmeleri umuduyla onlara silah ve mühimmat üretiminde destek sunmalıyız."
 GER_offer_military_production_support_tt: "Koruma altındaki tüm Doğu Avrupa devletleri §Y730§! gün boyunca §YAskeri Üretimlerine§! aşağıdaki desteği alacaklardır:"
 GER_liberate_oppressed_people: "Ezilen Halkları Özgürleştir"
 GER_liberate_oppressed_people_desc: "[SOV.GetNameDef]'de bize yakın olan ve her şeyden çok özgürleşmeyi isteyen birçok insan var. Belki onları zalimlerinden kurtarmalı ve doğudaki yeni müttefiklerimiz haline getirmeliyiz."
 GER_liberate_oppressed_people_tt: "§Y[SOV.GetNameDef]§!'in kurucu devletlerini özgürleştirmek §G%40§! daha ucuz ve kukla yapmak §G%20§! daha ucuz hale gelir."
 GER_liberate_oppressed_people_cossacks_tt: "Güney Rus §YKazak Cumhuriyetlerinin§! yeniden kurulmasını sağlar!"
 GER_build_the_eastern_bulwark: "Doğu Kalesini İnşa Et"
 GER_build_the_eastern_bulwark_desc: "Doğumuzdaki ülkelerin savunmaları [SOV.GetAdjective] tehdidine karşı düzgün bir şekilde direnmek için çok zayıf. Ülkelerinde tahkimatlara yatırım yapmalıyız, böylece onları almaya çalışmak düşman için mümkün olduğunca maliyetli olacaktır."
 GER_build_the_eastern_bulwark_tt: "§Y[ROOT.GetNameDef]§! veya §Y[ROOT.GetNameDef]§! tarafından garanti edilen veya onunla bir grupta olan herhangi bir ülke tarafından sahip olunan tüm eyaletlerde [SOV.GetNameDef]§! sınırında seviye 2 §YKara Kaleleri§! inşa eder."
 GER_build_the_eastern_bulwark_ns_tt: "§Y[SOV.GetNameDef]§! ile savaşa girdiğimizde şunları kazanacağız:"
 GER_ally_white_russian_forces: "Rus Beyaz Hareketi ile İttifak Kur"
 GER_ally_white_russian_forces_desc: "Kızılların Rus iç savaşını kazanmasından sonra yurtdışına kaçan birçok Rus var. Onlara ulaşmalı ve Brest-Litovsk antlaşmasında bize veya müttefiklerimize verilen topraklara yönelik herhangi bir iddiadan vazgeçme pahasına, vatanlarını geri alma konusunda işbirliği yapmaya istekli olup olmadıklarını görmeliyiz."
 GER_hold_joint_military_drills: "Ortak Askeri Tatbikatlar Düzenle"
 GER_hold_joint_military_drills_desc: "Doğu müttefiklerimiz [SOV.GetAdjective]'lerle bizden daha yakın zamanda savaştılar ve onları nasıl yeneceklerine dair değerli bilgilere sahip olabilirler. Bu tür bilgilerin yayılabilmesi için birlikte askeri tatbikatlar düzenlemeliyiz."
 GER_hold_joint_military_drills_tt: "Biz ve garanti ettiğimiz veya grubumuzda olan herhangi bir Doğu Avrupa ülkesi aşağıdaki ulusal ruhu kazanacaktır:"
 GER_extend_mitteleuropas_bounderies: "Mitteleuropa'nın Sınırlarını Doğuya Genişlet"
 GER_extend_mitteleuropas_bounderies_desc: "Doğumuzdaki uluslar sadece tampon devletlerden daha fazlasıdır. Onları Mitteleuropa'ya davet etmeli ve ittifakımızı ve gümrük birliğimizi daha da güçlendirmelerine yardımcı olmalarını sağlamalıyız."
 GER_extend_mitteleuropas_bounderies_tt: "Garanti Edilen Doğu Avrupa devletlerini §YMitteleuropa§!'ya davet eder!"
 GER_reach_out_to_scandinavia: "İskandinavya'ya Ulaş"
 GER_reach_out_to_scandinavia_desc: "Dağlar ve soğuk, [GER.GetGreatRedMenaceName] Tehdidine karşı bir koruma değildir ve İskandinavlar bunu bilmelidir. Onlara [SOV.GetAdjective]'lerin tehdidine karşı üyelik ve koruma sunacağız."
 GER_mitteleuropa: "Mitteleuropa"
 GER_mitteleuropa_desc: "Alman halkının ana ilgi alanı Orta Avrupa'dır, başlangıçta Prusyalılar tarafından pan-Germanist devlet merkezli bir imparatorluk olarak tasavvur edilmiştir. Bu fikirlerin biraz cilalanmaya ihtiyacı olabilir, ancak Avrupa'da yeni düzeni inşa edebileceğimiz iyi bir temeldir."
 GER_mitteleuropa_tt: "§YAvusturya'daki Kamuoyunu Kendi Tarafımıza Çekme§! kararının kilidini açar, bu da onları hem bir ittifakı hem de boyun eğmeyi kabul etmeye daha istekli hale getirir."
 GER_mitteleuropa_alliance: "Mitteleuropa"
 GER_brothers_in_arms: "Silah Arkadaşları"
 GER_brothers_in_arms_desc: "Avusturyalı kardeşlerimiz, Merkez Devletlerin bir parçası olarak bizimle birlikte sıkı bir şekilde savaştılar. Onlara reddedemeyecekleri bir teklifle ulaşmalıyız, böylece bir kez daha yan yana savaşabiliriz."
 GER_carve_up_czechoslovakia: "Çekoslovakya'yı Paylaş"
 GER_carve_up_czechoslovakia_desc: "[CZE.GetAdjective] devleti sadece bizim değil, aynı zamanda güneydeki müttefiklerimizin de emellerinin önünde duruyor. Mitteleuropa'nın gerçekleştirilebilmesi için onları aramızda paylaşmalıyız."
 GER_rekindle_imperial_sentiment_ww: "$GER_rekindle_imperial_sentiment$"
 GER_rekindle_imperial_sentiment_ww_desc: "$GER_rekindle_imperial_sentiment_desc$"
 GER_the_first_berlin_award: "Birinci Berlin Ödülü"
 GER_the_first_berlin_award_desc: "Polonyalılar sadece bizim topraklarımıza değil, aynı zamanda Avusturya-Macaristan topraklarına da çökmüş durumdalar. Bu bölgeleri Mitteleuropa'ya geri vermeleri için onları sindirmeye çalışmalıyız, aksi takdirde Alman ordularının gazabıyla karşı karşıya kalırlar."
 GER_the_first_berlin_award_hun_tt: "Eğer §Y[HUN.GetNameDef]§! ile bir gruptaysak:"
 GER_the_first_berlin_award_aus_tt: "Eğer §Y[AUS.GetNameDef]§! ile bir gruptaysak:"
 GER_the_second_berlin_award: "İkinci Berlin Ödülü"
 GER_the_second_berlin_award_desc: "Rumenler ve Slavlar da haklı olarak Avusturya-Macaristan topraklarını işgal ediyorlar. Bunları derhal iade etmelerini talep etmeliyiz!"
 GER_trade_agreements: "Ticaret Anlaşmaları"
 GER_trade_agreements_desc: "Mitteleuropa sadece bir güç ittifakı değil, aynı zamanda daha iyi ticaret ilişkileri ve ekonomik işbirliği kurmaya yardımcı olan bir birliktir. Bu rolü vurgulamalı ve doğal kaynaklar açısından zengin olanlara ulaşmak için kullanmalıyız."
 GER_trade_agreements_tt: "Tüm müttefikler §YUlusal Ruh§! alacaklardır:"
 GER_mitteleuropa_cooperation_sphere: "Mitteleuropa İşbirliği Alanı"
 GER_mitteleuropa_cooperation_sphere_desc: "Orta Avrupa birçok parlak zihne sahiptir. Buna rağmen, farklı hükümetlerinin bilgilerini kendilerine saklama arzuları nedeniyle işbirliği yapamıyorlar. Müttefiklerimizle daha yakın bilimsel işbirliğini teşvik etmeliyiz."
 GER_conquer_italy: "İtalya'yı Fethet"
 GER_conquer_italy_desc: "İtalyanlar Büyük Savaş sırasında Avusturya-Macaristan'a saldırıp İtilaf Devletleri'nin tarafını tuttuklarında bize ihanet ettiler. Asla unutmayacağız ve asla affetmeyeceğiz. Onlara ihanetin ve vefasızlığın nihayetinde neye yol açtığını öğretme zamanı geldi."
 GER_align_italy: "İtalya'yı Hizala"
 GER_align_italy_desc: "İtalya Büyük Savaş sırasında bize ihanet etmiş olabilir, ancak etkileyici bir donanmaya sahip oldukları gerçeğini unutmamalıyız, düşmanlarımızla başa baş mücadele edebilecek bir donanma. Bu nedenle onlarla eski ittifakımızı yeniden kurmaya çalışmalıyız."
 GER_the_austrian_question: "Avusturya Sorunu"
 GER_the_austrian_question_desc: "Küçük Alman çözümü bir hataydı, derhal düzeltmemiz gereken bir hata. Avusturyalıları ulusumuza katılmaya zorlamalı, hatta belki de [HUN.GetNameDef] ile bir ittifak karşılığında Burgenland'ı sunma fırsatını değerlendirmeliyiz."
 GER_the_austrian_question_more_likely_to_accept_tt: "Eğer şu anda bir grubun lideriyse kabul etme olasılıkları §Rdaha az§!."
 GER_align_czechoslovakia: "Çekoslovakya'yı Hizala"
 GER_align_czechoslovakia_desc: "Çekoslovak devleti, Avusturya-Macaristan'da sanayileşmenin merkezlerinden biri olarak, endüstriyel yetenekler ve doğal kaynaklar açısından zengindir. Zenginliklerinden yararlanabilmemiz için onları Mitteleuropa'ya katılmaya ikna etmeliyiz."
 GER_sway_the_balkans: "Balkanları Etkile"
 GER_sway_the_balkans_desc: "Balkanlar'da yabancı güçler tarafından tehdit edildiğini hisseden birçok ulus var. Birliğimizin daha da güçlenmesi için onlara Mitteleuropa'da bir yer teklif etmeliyiz."
 GER_sway_the_balkans_tt: "§YBalkan§! uluslarında §Y[ROOT.GetRulingIdeology] İdeolojisini Güçlendirme§! ve §YOnları Mitteleuropa'ya Getirme§! kararlarının kilidini açar!"
 GER_establish_a_customs_union: "Bir Gümrük Birliği Kur"
 GER_establish_a_customs_union_desc: "Eski Septemberprogramm'daki planlar gibi, şimdi Mitteleuropa gümrük birliğini kurmalı ve yavaş ama emin adımlarla Avrupa ekonomilerini en güçlü tek bir güce birleştirmeliyiz."
 GER_integrated_economies: "Entegre Ekonomiler"
 GER_integrated_economies_desc: "Müttefiklerimizin ekonomilerinin bizimkiyle entegrasyonu ve diğer devletlerin ekonomik durumunu izleyip yardımcı olabilecek bir Alman merkez bankasının kurulması, uzun vadede bizim için çok faydalı olacak, sadece bizi güçlendirmekle kalmayacak, aynı zamanda bize olan bağımlılıklarını artıracak ve sonunda dış ilişkilerinin kontrolünü ele almamızı sağlayacaktır."
 GER_integrated_economies_tt: "Her §YGrup Üyesi§! §YOlay:§! [GER.GetNameDefCap] Ekonomimizin Daha Fazla Entegrasyonunu İstiyor alacaktır"
 GER_european_confederation: "Avrupa Konfederasyonu"
 GER_european_confederation_desc: "Müttefiklerimiz artık bize büyük ölçüde bağımlı olduklarından, onları daha da entegre etmeye çalışma zamanı geldi, bir Avrupa Konfederasyonu kurma hayalleriyle."
 GER_bring_turkey_into_the_fold: "[TUR.GetNameDef]'i Tekrar Safımıza Kat"
 GER_bring_turkey_into_the_fold_desc: "Türklerin mevcut sınırlarının dışında iddiaları var ve grubumuza katılmaya kolayca ikna edilebilirler. Onları bir kez daha safımıza katma zamanı geldi."
 GER_german_hegemony_in_the_middle_east: "Orta Doğu'da Alman Hegemonyası"
 GER_german_hegemony_in_the_middle_east_desc: "Orta Doğu fethedilmeye hazır ve birçok devlet İngiliz veya Fransız imparatorluklarına karşı çıkacağımız umuduyla bizimle aynı hizaya gelmeye istekli olabilir. Orta Doğu'da hegemonyamızı kurma zamanı geldi."
 GER_sway_the_middle_east_decisions_tt: "§YOrta Doğu§! uluslarında §Y[ROOT.GetRulingIdeology] İdeolojisini Güçlendirme§! ve §YOnları Mitteleuropa'ya Getirme§! kararlarının kilidini açar!"
 GER_reject_the_locarno_treaty: "Locarno Antlaşmasını Reddet"
 GER_reject_the_locarno_treaty_desc: "Locarno Antlaşması açıkça haksız yere bizden alınan toprakları geri almamızı engellemek için kurulmuştu. Bu antlaşmayı tamamen reddetmeli ve eski eyaletlerimizi geri almak için hazırlanmalıyız."
 GER_backdoor_negotiations: "Arka Kapı Müzakereleri"
 GER_backdoor_negotiations_desc: "Alçak ülkelerdeki Batı müdahalesini, hepsine saldırmayarak, bunun yerine birini diğerine saldırmaya kışkırtarak ve sonra onlardan birinin tarafına katılarak aşmaya çalışabiliriz, bu da Büyük Hollanda bölgesindeki eski uluslar arasında etkili bir bölünmeye neden olur."
 GER_backdoor_negotiations_tt: "Bu kararlar, diğerine saldırırken hedef uluslardan birini grubumuza eklememize olanak tanır."
 GER_schlieffen_once_more_ww: "$GER_schlieffen_once_more$"
 GER_schlieffen_once_more_ww_desc: "$GER_schlieffen_once_more_desc$"
 GER_bypass_maginot_in_the_south_ww: "$GER_bypass_maginot_in_the_south$"
 GER_bypass_maginot_in_the_south_ww_desc: "$GER_bypass_maginot_in_the_south_desc$"
 GER_reinstate_imperial_possessions_ww: "$GER_reinstate_imperial_possessions$"
 GER_reinstate_imperial_possessions_ww_desc: "$GER_reinstate_imperial_possessions_desc$"
 GER_establish_western_grand_duchies: "[GetWesternDuchiesName]"
 GER_western_duchies_name_democratic: "Batı Özerk Devletleri"
 GER_western_duchies_name_neutrality: "Batı Büyük Dükalıklarını Kur"
 GER_establish_western_grand_duchies_desc: "Septemberprogramm'daki plan gibi, batı bölgeleri üzerinde kontrolümüzü kendi kukla devletlerimizi yaratarak, sınırları uygun gördüğümüz şekilde çizerek kurmaya çalışmalıyız."
 GER_integrate_western_german_speakers: "Batı Almanca Konuşanları Entegre Et"
 GER_integrate_western_german_speakers_desc: "Septemberprogramm, büyük Lüksemburg bölgesinin Alman devletiyle bütünleşmesini öngörüyordu. Hem o bölge hem de İsviçre eskiden Kutsal Roma İmparatorluğu'nun bir parçasıydı ve biz onun tek haklı halefiyiz. Bu Cermen bölgeleri mümkün olduğunca çabuk krallığımıza yeniden dahil edilmelidir."
 GER_core_ardennes_tt: "Eğer [ROOT.GetnameDef] [BEL.GetNameDef] ile §Ybir grupta değilse§! ve [980.GetName]'ı §Ytamamen kontrol ediyorsa§!:"
 GER_core_german_switzerland_tt: "Eğer [ROOT.GetnameDef] [SWI.GetNameDef] ile §Ybir grupta değilse§! ve [3.GetName], [847.GetName] ve [151.GetName]'ı §Ytamamen kontrol ediyorsa§!:"
 GER_core_alto_adige_tt: "Eğer [ROOT.GetnameDef] [ITA.GetNameDef] ile §Ybir grupta değilse§! ve [39.GetName]'ı §Ytamamen kontrol ediyorsa§!:"
 GER_assassinate_mussolini_ww: "Mussolini'ye Suikast Düzenle"
 GER_assassinate_mussolini_ww_desc: "[ITA.GetAdjective] faşizminin kilit isminin sonunu sağlama zamanı geldi. Alman elleri lideri öldürecek, ardından [ITA.GetAdjective] kralcıları tek bir hızlı hareketle iktidarı ele geçirecekler."
 GER_prepare_italian_coup_ww: "[ITA.GetAdjective] Darbesini Hazırla"
 GER_prepare_italian_coup_ww_desc: "İtalya'nın faşizme düşüşü geri alınmalıdır. [ITA.GetAdjective] kralcılarına desteğimizle bir darbe teklifiyle yaklaşacağız."





