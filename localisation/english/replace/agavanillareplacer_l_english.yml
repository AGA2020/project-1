 ### GERMAN FOCUS TREE ###
 FOCUS_ICON_SET_HISTORICAL_KEY_FOCUS: "Tarihsel Kilit Odak"

 GER_prioritize_economic_growth: "Ekonomik Büyümeye Öncelik Ver"
 GER_prioritize_economic_growth_desc: "Yıllardır süregelen ihmalkâr mali politikalar ekonomimizi neredeyse mahvetti. Tanklar yerine traktörler yapmalı, tüfekler yerine kürekler dağıtmalı ve silah sanayisini büyütmek yerine ekonomik büyümeye öncelik vermeliyiz!"
 GER_currency_reforms: "Para Reformları"
 GER_currency_reforms_desc: "Ekonomik toparlanma ve canlandırmanın ilk adımı kapsamlı para reformları yapmaktır."
 GER_lower_taxes: "Vergileri Düşür"
 GER_lower_taxes_desc: "Yeniden silahlanma programını finanse etmek için halkımızın üzerindeki vergi yükü giderek ağırlaştı. Bu yükü hafifleterek kısa vadede devlet gelirinden mahrum kalabiliriz ancak insanlar zor kazanılan paralarını ileride daha fazla harcayabilecekler."
 GER_workers_rights: "İşçi Hakları"
 GER_workers_rights_desc: "Sendikalar son birkaç yılda temelden değişti ve eski hallerinden tanınmaz hale geldiler. Onları reforme ederek işçileri bir araya getirebilir ve faydalarını görebiliriz."
 GER_abolish_price_controls: "Fiyat Kontrollerini Kaldır"
 GER_abolish_price_controls_desc: "Yeniden silahlanmayı desteklemek için uygulanan fiyat kontrolü önlemleri ekonomiyi boğuyor. Bunları kaldırmak devletin fonlarını azaltabilir ancak insanların yeni işler kurmasını ve ekonomiyi canlandırmasını sağlayacaktır."
 GER_increased_trade: "Artan Ticaret"
 GER_increased_trade_desc: "Alman halkının refaha kavuşması için kendi sınırlarımız içinde çıkaramadığımız veya inşa edemediğimiz şeyleri ithal etmeliyiz. Dışarıya bakmalı ve diğer uluslarla yeni ticaret anlaşmaları imzalamalıyız - elbette bizi kayıran anlaşmalar."
 GER_housing_developments: "Konut Geliştirme Projeleri"
 GER_housing_developments_desc: "Modern evleri yenilemeyi ve yaratmayı ve yeni bir yaşam standardı belirlemeyi amaçlayan bir konut geliştirme programı başlatarak ekonomimizi canlandırabiliriz."
 GER_invest_in_vereinigte_stahlwerke: "Vereinigte Stahlwerke'ye Yatırım Yap"
 GER_invest_in_vereinigte_stahlwerke_desc: "Vereinigte Stahlwerke en büyük ve en önemli çelik üreticilerimizden biridir. Şirkete kaynak yatırımı yapmak kesinlikle artan verimlilik sağlayacak ve Alman çelik endüstrisini dönüştürecektir."
 GER_industrial_expansion: "Sanayi Genişlemesi"
 GER_industrial_expansion_desc: "Uluslararası rekabet edebilen ve yeni teknolojilere öncülük eden güçlü bir sanayiye sahip olmak, sürekli büyümemiz için çok önemli olacaktır. [ROOT.GetNameDefCap] kalite ile eş anlamlı hale gelecektir."
 GER_agricultural_reforms: "Tarım Reformları"
 GER_agricultural_reforms_desc: "Tarım sektörümüz çoğunlukla küçük ölçekli, aile işletmesi çiftliklerden oluşuyor ve çok fazla el emeği gerektiriyor. Modern ekipmanları tanıtarak ve her bir çiftliğin üretim çıktısını artırarak tüm tarım sektörünü reforme edebiliriz. Bütün ulusumuz bundan faydalanacaktır!"
 GER_urbanization: "Kentleşme"
 GER_urbanization_desc: "Tarımda modern makinelerin kullanılması birçok insanı serbest bıraktı ve şimdi yeni iş aramak için şehirlere akın ediyorlar. Bu insanlar, ekonomimizi dünyanın en güçlülerinden biri yapmaya devam edebilecekleri fabrikalarımızda iyi bir şekilde kullanılabilir."
 GER_wirtschaftswunder: "Wirtschaftswunder"
 GER_wirtschaftswunder_desc: "Ekonomiyi canlandırmaya yönelik tüm programlarımız ve girişimlerimiz nihayet meyvesini verdi! Dünyanın dört bir yanındaki insanlar mali ve endüstriyel toparlanmamıza hayran kaldı ve buna 'Wirtschaftswunder' - bir ekonomik mucize diyorlar."
 GER_mass_production: "Seri Üretim"
 GER_mass_production_desc: "Son zamanlarda kaydettiğimiz tüm endüstriyel ilerlemeyle üretim araçları hakkında çok şey öğrendik. Bu yeni keşfedilen bilgi ve anlayışı montaj hatlarımızı modernize etmek ve daha önce hiç görülmemiş bir ölçekte malzeme üretmek için kullanmalıyız."
 GER_build_defense_industry: "Bir Savunma Sanayisi İnşa Et"
 GER_build_defense_industry_desc: "Nihayet ekonomimizi istikrara kavuşturmayı ve hatta kat kat güçlendirmeyi başardıktan sonra, şimdi dikkatimizi ulusumuzun egemenliğini güvence altına almaya ve Alman halkının çalışkanlığını, ilerleme ve mükemmellik arzusunu koruyan uygun bir savunma sanayisi inşa etmeye çevirebiliriz."
 GER_war_production: "Savaş Üretimi"
 GER_war_production_desc: "Savaş bizi bir kez daha sardı, ama boyun eğmeyeceğiz ve düşmeyeceğiz! Endüstriyel gücümüzü seferber edeceğiz ve Alman halkının boyun eğmez iradesini ezebileceklerini düşünecek kadar akılsız olan herhangi bir düşmanı üretimde geride bırakacağız!"
 GER_construct_the_reichsautobahn: "[GetAutobahnName]'ı İnşa Et"
 GER_autobahn_fascism: "Reichsautobahn"
 GER_autobahn_neutral: "Kaiserliche Autobahn"
 GER_autobahn_democratic: "Otoban"
 GER_autobahn_communism: "Volksautobahn"
 GER_construct_the_reichsautobahn_desc: "$GER_autobahn_desc$"
 GER_kdf_wagen_factories: "[GetKfdWagenNames]"
 GER_kdf_wagen_factories_fascist: "KdF-Wagen Fabrikaları"
 GER_kdf_wagen_factories_neutral: "Wilhelm-Wagen Fabrikaları"
 GER_kdf_wagen_factories_volkswagen: "Volkswagen Fabrikaları"
 GER_kdf_wagen_factories_desc: "[GetKDFFactoriesText]"
 GER_kdf_wagen_factories_autarky_text: "$GER_kdf_wagen_desc$"
 GER_kdf_wagen_factories_economic_growth_text: "Yeni [GetAutobahnName]larımız inşa edildiğine göre, onları arabalarla doldurmalıyız. Gerçekten müreffeh ve modern bir ekonomi olmak için bu arabaları üretebilecek fabrikalar inşa etmeliyiz - aynı zamanda iş ve istihdam yaratmalıyız."
 GER_expand_the_reichsautobahn_south: "[GetAutobahnName]'ı Güneye Genişlet"
 GER_expand_the_reichsautobahn_south_desc: "Otoban ağını güneye doğru genişletmek bölgedeki ekonomik büyümeyi ve kalkınmayı teşvik edecektir. Ayrıca Alplere doğru hızlı asker naklini sağlayarak askeri yeteneklerimizi güçlendirecektir."
 GER_expand_the_reichsautobahn_south_tt: "§Y[53.GetName]§!, §Y[52.GetName]§!, §Y[152.GetName]§!, §Y[4.GetName]§! eyaletlerine §G1§! §Y$infrastructure$§! ekle ve §Y[ROOT.GetName]§! veya bir Alman vasalı eyaletleri kontrol ediyorsa §Y[53.GetName]§!'dan §Y[4.GetName]§!'a seviye §Y1§! demiryolu ekle. Mevcut etki:"
 GER_expand_the_reichsautobahn_east: "[GetAutobahnName]'ı Doğuya Genişlet"
 GER_expand_the_reichsautobahn_east_desc: "Otoban ağını Doğu Prusya'ya doğru genişletmek, ulusumuzun en doğudaki bölgemizi [ROOT.GetNameDef]'in geri kalanıyla yeniden bağlama ve birleştirme kararlılığını gösterecektir. Ayrıca gerekirse doğuya daha sert ve daha hızlı saldırmamızı sağlayacaktır."
 GER_expand_the_reichsautobahn_east_tt: "§Y[68.GetName]§!, §Y[63.GetName]§!, §Y[807.GetName]§!, §Y[85.GetName]§! eyaletlerine §G1§! §Y$infrastructure$§! ekle ve §Y[ROOT.GetName]§! veya bir Alman vasalı eyaletleri kontrol ediyorsa §Y[63.GetName]§!'dan §Y[85.GetName]§!'a seviye §Y1§! demiryolu ekle. Mevcut etki:"
 GER_develop_heraeus_facilities: "Heraeus Araştırma Tesislerini Geliştir"
 GER_develop_heraeus_facilities_desc: "Yeni tesislere yatırım yapmak, modern bir ordunun ihtiyaç duyduğu değerli metallere yönelik artan talebe erişimi güvence altına alabilir. Bu özel malzemeler elektronik ve yüksek kaliteli silahlar için gereklidir."
 GER_build_the_rur_dam: "Rur Barajını İnşa Et"
 GER_build_the_rur_dam_desc: "Rur Barajı'nı inşa etmek sadece bir mühendislik başarısından daha fazlasıdır - geleceğe yönelik bir yatırımdır. Baraj sadece bölgedeki ekonomik kalkınmayı desteklemekle kalmayacak, aynı zamanda endüstriyel çabalarımızı ve üretim çıktımızı da beslemeye yardımcı olacaktır."
 GER_trade_deal_with_sweden: "İsveç ile Ticaret Anlaşması"
 GER_trade_deal_with_sweden_desc: "$GER_swedish_trade_agreement_desc$"
 GER_the_four_year_plan: "Dört Yıllık Plan"
 GER_the_four_year_plan_desc: "$GER_four_year_plan_desc$"
 GER_autarky_efforts: "Otarşi Çabaları"
 GER_autarky_efforts_desc: "$GER_autarky_desc$"
 GER_gain_autarkic_economy_lock_free_trade_tt: "§Y$free_trade$§! ve §Y$export_focus$§! kanunlarını §RKilitle§!. §Y$autarkic_economy$§! kazan."
 GER_improve_trade_relations_tt: "Mevcut ve gelecekteki §YGrup Üyeleri§! ile §YTicaret Etkisini§! geliştir!"
 GER_institute_price_controls: "Fiyat Kontrollerini Kur"
 GER_institute_price_controls_desc: "Kendi kendine yeterli olma yönündeki iddialı hedeflerimiz altında ezilmemesi için maliye üzerindeki kontrolümüzü güçlendirecek çeşitli önlemler almalıyız. Enflasyonu dizginlemek ve ekonomik istikrarı sağlamak için ithalat, temel mallar ve işçi ücretlerinin fiyatlarını düzenleyebilmeliyiz."
 GER_unlock_price_controls_decision_tt: "Kararın kilidini açar: §Y$GER_price_controls_cat$§!, bu da §Y$MODIFIER_CONSUMER_GOODS_FACTOR$§! oranını azaltabilir"
 GER_industrial_consumer_goods_factor_limit_tt: "§Y[GetIndustrialModifier]§!, $MODIFIER_CONSUMER_GOODS_FACTOR$ oranından §Rdaha az§! sahip: §Y90%§!"
 GER_establish_the_reichswerke: "$GER_reichswerke$'yi Kur"
 GER_establish_the_reichswerke_desc: "$GER_hermann_goring_werke_desc$"
 GER_unlock_reichswerke_tt: "Sanayi Kuruluşu §Y$GER_reichswerke$§!'nin kilidini açar!"
 GER_seize_foreign_industries: "Yabancı Sanayilere El Koy"
 GER_seize_foreign_industries_desc: "Yabancı sanayileri ekonomimize entegre ederek savaş çabalarımızı ve üretimimizi destekleyen hayati kaynakları güvence altına alırız."
 GER_coal_liquefaction: "Kömür Sıvılaştırma"
 GER_coal_liquefaction_desc: "$GER_coal_liquidization_desc$"
 GER_subsidize_hoesch_benzin: "Hoesch-Benzin'i Sübvanse Et"
 GER_subsidize_hoesch_benzin_desc: "Eskiden bir ordunun midesiyle yürüdüğü söylenirdi, ancak modern bir ordu yakıtla çalışır. Askeri yeteneklerimizi sürdürmek için sentetik yakıt üretme çabalarımızı yoğunlaştırmalıyız."
 GER_establish_buna_werke: "Buna-Werke'yi Kur"
 GER_establish_buna_werke_desc: "Büyük ölçekli motorizasyon ve havacılık, Almanya'da kaynağına sahip olmadığımız büyük miktarlarda kauçuk gerektirir. Dış ticarete daha az bağımlı olmak için sentetik kauçuk üretebilen fabrikalar inşa etmeliyiz."
 GER_autarky_achieved: "Otarşiye Ulaşıldı"
 GER_autarky_achieved_desc: "Sonunda tamamen kendi kendine yeterli olma konusundaki iddialı hedeflerimize ulaştık! Ulusumuz doğal kaynaklarla bolca zenginleşti, bu da bizi daha da güçlendirecek - bizi durdurulamaz kılacak!"
 GER_improve_autarkic_economy_tt: "§Y$autarkic_economy$§!'yi Geliştir!"
 GER_accelerate_the_rearmament_program: "Yeniden Silahlanma Programını Hızlandır"
 GER_accelerate_the_rearmament_program_desc: "Versay Antlaşması'nın zincirlerini kırmalı ve sanayinin örslerinin [ROOT.GetNameDef] için görkemli bir kader dövmesine izin vermeliyiz. Üretilen her tank, monte edilen her uçak, Alman halkının boyun eğmez iradesinin bir kanıtı olarak duracaktır."
 GER_concentrated_armament_program: "Yoğunlaştırılmış Silahlanma Programı"
 GER_concentrated_armament_program_desc: "Sanayilerimiz, ulusumuzu yeniden silahlandırmak için askeri ihtiyaçlarımızı desteklemelidir. Silahlı kuvvetlerimizi hızla modernize etmek ve genişletmek için kapsamlı bir yeniden silahlanma programı başlatılmalıdır!"
 GER_establish_production_targets: "Üretim Hedefleri Belirle"
 GER_establish_production_targets_desc: "Herhangi bir askeri harekat başlatmadan önce, silahlı kuvvetlerimizi modernize etmeli ve donatmalıyız. Üretim çıktısını artırmak için kotalar ve iddialı üretim hedefleri uygulamalıyız."
 GER_prioritize_the_army: "Orduya Öncelik Ver"
 GER_prioritize_the_army_desc: "Almanya ve ondan önce Prusya, her zaman bir kara gücü olmuş ve egemenliğimizi ve güvenliğimizi korumak için orduya güvenmiştir. Ordumuzun iyi donanımlı olmasını ve herhangi bir düşmanı boyunduruk altına alabilecek kapasitede olmasını sağlamak için endüstriyel çabalarımızı yeniden yönlendirmeliyiz."
 GER_prioritize_the_navy: "Donanmaya Öncelik Ver"
 GER_prioritize_the_navy_desc: "Mevcut sınırlarımızın ötesine ulaşmak istiyorsak denizler üzerindeki kontrol hayati olacaktır. Donanmaya öncelik vermeliyiz ki boyut ve güç olarak herhangi bir düşman filosuyla rekabet edebilsin."
 GER_extra_funds_to_waffenamt: "Waffenamt'a Ek Fon"
 GER_extra_funds_to_waffenamt_desc: "Waffenamt veya Silah Ajansı, askeri teçhizatın tasarımını ve geliştirilmesini denetler. Silah üreticileri ve araştırma enstitüleriyle işbirliği yapar ve ona ek fonlar vererek ilerleme hızını artırabiliriz."
 GER_zentrale_planung: "Zentrale Planung'u Kur"
 GER_zentrale_planung_desc: "Savaş, silahlanma çabalarımızdaki eksiklikleri ortaya çıkardı, bu eksiklikleri gidermeliyiz! Hükümet, sanayi ve ordudan üyelerle bir Merkezi Planlama Kurulu oluşturarak, ekonomik politikaları koordine edebilir ve silah üretimimizi desteklemek, ulusal hedeflerimizi ve askeri üstünlüğümüzü desteklemek için kaynakları verimli bir şekilde yeniden yönlendirebiliriz."
 GER_criteria_for_economy_laws_tt: "§Y$partial_economic_mobilisation$§! etkinleştirilmişse, Ekonomi Yasası mevcutsa §Y$war_economy$§! olarak değişecektir."
 GER_create_rustungsstab: "Rüstungsstab'ı Oluştur"
 GER_create_rustungsstab_desc: "Silah üretimini modernize etme çabamız başarılı oldu, ancak daha fazla iyileştirmeye ihtiyaç var! Bir Silahlanma Personeli oluşturmak, kaynakları tahsis etmek ve silah üretimimizi artırmak için projeleri önceliklendirmek üzere stratejiler geliştirmemizi sağlayacaktır."
 GER_armament_rationalization: "Silahlanma Rasyonalizasyonu"
 GER_armament_rationalization_desc: "Üretim hatlarımız silahlı kuvvetlerimizin ihtiyaçlarına zar zor yetişebiliyor. Endüstriyel savaş makinemizin verimliliğini ve etkinliğini artırmak için silahlanma rasyonalizasyonu önlemleri uygulamalıyız."
 GER_totaler_krieg: "Totaler Krieg"
 GER_totaler_krieg_desc: "Tam zafere ulaşmak için tüm toplumumuzu seferber etmeli ve topyekûn savaşı düşmanımızın kapısına getirmeliyiz. [ROOT.GetNameDef]'in ayağa kalkma ve fırtınanın kopmasına izin verme zamanı geldi!"
 GER_gain_totaler_krieg_remove_total_mob_tt: "§Y$tot_economic_mobilisation$§!'ı §RKaldır§!. §Y$totaler_krieg_economy$§! kazan."
 #ARMY
 GER_develop_modern_maneuver_warfare: "Modern Manevra Savaşını Geliştir"
 GER_develop_modern_maneuver_warfare_desc: "Modern savaşın gelişen doğasını tanımalı ve savaş alanındaki askeri etkinliğimizi en üst düzeye çıkarmak için piyade ve yeni teknolojilerin entegrasyonunu vurgulayan yeni bir doktrin geliştirmeliyiz."
 GER_fortify_the_vaterland: "Vatanı Tahkim Et"
 GER_fortify_the_vaterland_desc: "[GER.GetNameDef]'i güvence altına almak için ihtiyaç duyulan her yerde tahkimatlar inşa etmeliyiz. Savunmalarımızı güçlendirmek, sınırları daha az adamla tutmamızı sağlayacak ve tümenleri başka yerlerdeki potansiyel saldırılara katılmak üzere serbest bırakacaktır."
 GER_fortify_the_vaterland_unlock_decision_tt: "Kararın kilidini açar: §Y$GER_fortify_the_vaterland_cat$§!"
 GER_all_terrain_military_motorcycle: "Arazi Askeri Motosikleti"
 GER_all_terrain_military_motorcycle_desc: "Hızlı keşfin önemi abartılamaz. Motosiklet birimlerine yatırım yapmak, kritik savaş alanı istihbaratı sağlayacak, stratejik karar almayı sağlayacak ve operasyonel etkinliği artıracaktır."
 GER_salvage_captured_equipment: "Ele Geçirilen Ekipmanı Kurtar"
 GER_salvage_captured_equipment_desc: "Ele geçirilen düşman teçhizatını ordumuz için kurtarmak ve yeniden kullanmak üzere tesisler kurarak, silahlı kuvvetlerimizi desteklemek için ele geçirilen silahları, araçları ve makineleri yenileyebilir ve entegre edebiliriz."
 GER_unlock_operational_planning_blitzkrieg_tt: "Kararın kilidini açar: §Y$GER_operational_planning_category$§!, etkinleştirildiğinde §Y45 gün§! boyunca şunları verir:"
 GER_unlock_operational_planning_bewegungskrieg_tt: "Kararın kilidini açar: §Y$GER_operational_planning_category$§!, etkinleştirildiğinde §Y90 gün§! boyunca şunları verir:"
 GER_the_prussian_legacy: "Prusya Mirası"
 GER_the_prussian_legacy_desc: "'Bazı devletlerin bir ordusu varken, Prusya Ordusu'nun bir devleti vardır', demişti Voltaire bir zamanlar. Savaş alanında hızlı ve ezici zaferler sağlamak için eski Alman doktrini olan Bewegungskrieg'i - manevra savaşı - geliştirerek bunu somutlaştıracağız."
 GER_improve_motorized_troops: "Motorize Birlikleri Geliştir"
 GER_improve_motorized_troops_desc: "Modern savaş hız ve hızlı saldırı yetenekleri etrafında döner. Schnelltruppen'imizin, yani motorize birliklerimizin, hücuma liderlik etmeye ve hızlı ve kesin bir zafer sunmaya hazır ve yetenekli olmasını sağlamalıyız."
 GER_lessons_of_the_great_war: "Büyük Savaşın Dersleri"
 GER_lessons_of_the_great_war_desc: "Büyük Savaş'taki başarısızlıklarımız, gelecekteki çatışmalarımız için hayati önem taşıyan paha biçilmez bilgiler sunuyor. Geçmişi büyük bir ayrıntıyla inceledik ve şimdi tarihin öğrettiği dersleri uygulamalıyız."
 GER_stormtroopers: "Hücum Kıtaları"
 GER_stormtroopers_desc: "Büyük Savaş'ın Stosstruppen'i, düşman siperlerine yönelik saldırılara liderlik etmek ve ana piyadenin yararlanabileceği yarmalar yaratmak için tasarlanmış seçkin şok birlikleriydi. Bu fikri yeniden canlandırmalı ve savaş alanında hız, çeviklik ve acımasız verimliliği simgeleyecek yeni seçkin şok birlikleri eğitmeliyiz."
 GER_sturmtruppe_battalion_tt: "Destek taburu §Y$sturmtruppe_battalion$§!'un kilidini açar."
 GER_artillery_bombardment: "Topçu Bombardımanı"
 GER_artillery_bombardment_desc: "Piyade ordumuzun bel kemiğidir ve başarılı olmaları için uygun desteğe ihtiyaçları vardır. Piyademizin herhangi bir avantajı zorlayabilmesi ve önlerindeki herhangi bir düşmanı yenebilmesi için topçuya yoğun bir şekilde yatırım yapmalıyız."
 GER_instill_auftragstaktik: "Auftragstaktik'i Aşıla"
 GER_instill_auftragstaktik_desc: "Ordumuz uzun süredir merkezi olmayan komuta ve bireysel inisiyatifi vurgulayan auftragstaktik veya görev komutasını uygulamaktadır. Bu, esneklik ve özerkliğe yol açarak öngörülemeyen durumlara uyum sağlama ve başarılı olma yeteneğimizi artırmıştır. Güçlerimizin her zaman galip gelmesi için bu uygulamayı sürdürmemiz çok önemlidir!"
 GER_establish_the_afrikakorps: "Afrikakorps'u Kur"
 GER_establish_the_afrikakorps_desc: "Düşmanımızın ikmal hatlarını bozabilmek ve hayati kaynakları ve stratejik konumları güvence altına alabilmek için savaşı Avrupa'dan çıkarıp yabancı kıyılara taşımalıyız!"
 GER_unlock_operational_planning_in_africa_tt: "Kararın kilidini açar: §YAfrika'da Operasyonel Planlama§!"
 GER_revive_the_schutztruppe: "Schutztruppe'yi Canlandır"
 GER_revive_the_schutztruppe_desc: "Schutztruppen, sömürge imparatorluğumuzun Afrika topraklarında kullandığımız sömürge birlikleriydi. Büyük Savaş'ın Doğu Afrika Seferi sırasında ve daha önceki küçük ölçekli çatışmalarda bize iyi hizmet ettiler. Gözlerimizin bir kez daha Afrika ve Asya'ya yöneldiği göz önüne alındığında, sömürge ofislerini yeniden kurma ve yeni ve geliştirilmiş bir Schutztruppe birliğini düşünme zamanı gelmiş olabilir."
 GER_revive_the_schutztruppe_tt: "§YSchutztruppe§! sömürge milislerinin ve onları §YAskere Alma§! ve §Yİyileştirme§! kararlarının kilidini açar"
 GER_establish_the_skijager: "Skijäger'i Kur"
 GER_establish_the_skijager_desc: "Silahlı kuvvetlerimizin her türlü hava koşulunda etkinliklerini ve uyum yeteneklerini sürdürmelerini sağlamak için kış savaşı sanatında ustalaşmalıyız. Bu amaçla, karlı ve dağlık arazide etkili bir şekilde faaliyet göstermek üzere Skijäger olarak bilinen özel dağ birliklerini eğitecek ve donatacağız."
 GER_panzergrenadier: "Panzergrenadier"
 GER_panzergrenadier_desc: "Askeri doktrinimiz hareketliliğe dayanır ve motorize birliklerimizin ne kadar iyi performans gösterdiğine bağlı olacaktır. Ne piyade ne de panzer tümenleri uygun destek olmadan ilerlemelerinde başarılı olamaz. Mekanize piyadeleri mızrak uçlarımızla entegre ederek, kuvvetlerimizin saldırı operasyonlarında üstünlüğünü korumasını sağlıyoruz."
 GER_modify_bewegungskrieg_or_blitzkrieg_tt: "§Y$GER_blitzkrieg_modifier$§! veya §Y$GER_bewegungskrieg_modifier$§!'yi şu şekilde değiştir:"
 GER_heavy_armored_car_recon_company_tt: "\n§Y$armored_car_recon$§!:\n§YZırh§!: §G+5%§!\n§YOrman§!:\n Hareket Etkili Değişim: §G+5%§!\n§YÇöl§!:\n  Hareket Etkili Değişim: §G+10%§!\n§YOva§!:\n Hareket Etkili Değişim: §G+10%§!\n"
 GER_nationalize_ford_factories: "Ford Fabrikalarını Millileştir"
 GER_nationalize_ford_factories_desc: "[51.GetName]'daki Ford fabrikalarının kontrolünü ele geçirmek ve onları devlet kontrolü altına almak, endüstriyel kapasitemizi güçlendirecek ve silahlı kuvvetlerimizi ve lojistiğimizi desteklemek için hayati ekipman ve araçların istikrarlı bir şekilde tedarik edilmesini sağlayacaktır."
 GER_kriegslokomotiven: "Kriegslokomotiven"
 GER_kriegslokomotiven_desc: "Savaşın lojistik zorlukları, kriegslokomotiven veya savaş lokomotiflerinin üretimini gerektirir. Bu trenler, ekonomik koşullarımıza ve hızlı, ucuz seri üretim ihtiyacına göre uyarlanacaktır."
 GER_improve_the_logistics_system: "Lojistik Sistemini İyileştir."
 GER_improve_the_logistics_system_desc: "Yüksek Komuta'daki generallerimizin çoğu, mevcut sistemimizin sorunlarını anlamaktan yoksun bir şekilde lojistik ve tedarik zincirlerine karşı küçümseyici bir tavır sergiliyor. Modern savaşta verimli lojistiğin büyük öneminin farkına varmalılar, zira lojistik sistemimizi geliştirmek için kapsamlı bir girişim başlatıyoruz."
 GER_defend_the_vaterland: "Vatanı Savun"
 GER_defend_the_vaterland_desc: "Sınırlarımızda tehditler belirirken, Vatan savunmasında sağlam durmalıyız! Alman halkını korumak için mevzilerimizi güçlendirmeli ve birliklerimizi toplamalıyız - [ROOT.GetNameDef] dayanacak ve zafer kazanacaktır!"
 GER_uranverein: "Uranverein"
 GER_uranverein_desc: "Ulusumuz atom enerjisi araştırmalarına öncülük etmeli ve potansiyelini kendimiz için kullanmalıyız. Bunu takip etmek ve dünyaların yok edicisi olmak için Dünya'daki en keskin zekalardan bazılarına sahibiz."
 GER_adopt_new_panzer_doctrine: "Yeni Panzer Doktrini Benimse"
 GER_adopt_new_panzer_doctrine_desc: "$GER_army_innovation_desc$"
 GER_panzer_troops_school: "Panzer Birlikleri Okulu"
 GER_panzer_troops_school_desc: "Panzer tümenleri herhangi bir modern çatışmada hayati bir rol oynayacaktır ve zırhlı kuvvetlerimizin askeri yeniliğin ön saflarında yer almasını sağlamalıyız. Titiz eğitim ve uzman eğitmenler aracılığıyla, zafer için gerekli olan seçkin panzer birimlerini yetiştireceğiz."
 GER_advanced_panzer_research: "Gelişmiş Panzer Araştırması"
 GER_advanced_panzer_research_desc: "En son tank teknolojilerini araştırmak ve geliştirmek için kaynak ayırmak yeni bilgiler ve çığır açan sonuçlar verecektir. Bu, savaş yeteneklerimizi artıracak ve panzerlerimizi daha da ölümcül hale getirecektir."
 GER_expand_kummersdorfs_capacity: "Kummersdorf'un Kapasitesini Genişlet"
 GER_expand_kummersdorfs_capacity_desc: "Panzer geliştirmede öncü olmalı ve savaş alanındaki hakimiyetimizi sağlamak için yeniliklere öncülük etmeliyiz. Kummerdorf'taki tesislerde düşman tank tasarımlarını inceleyerek ve en son teknolojiden yararlanarak, tüm rakipleri geride bırakan ilerlemelere öncülük edeceğiz."
 GER_combined_arms: "Birleşik Silahlar"
 GER_combined_arms_desc: "Teknolojideki hızlı ilerlemeler savaşın nasıl yürütüldüğünü değiştirdi, bundan faydalanmalıyız. Birleşik silahlar ilkesini benimseyerek ve piyade, zırhlı ve hava desteğini senkronize etmek için kapsamlı bir strateji oluşturarak, müthiş bir savaş gücü yaratacak ve üstünlüklerini güvence altına alacağız."
 #LUFTWAFFE
 GER_expanding_the_luftwaffe: "Luftwaffe'yi Genişletme"
 GER_expanding_the_luftwaffe_desc: "$air_innovation_desc$"
 GER_aeronautical_research_institute: "Havacılık Araştırma Enstitüsü"
 GER_aeronautical_research_institute_desc: "Hava savaşı, Büyük Savaş'tan bu yana önemi ve karmaşıklığı artmıştır ve Versay Antlaşması bize bir hava kuvveti bulundurmayı yasakladığından, uçak geliştirmede geride kaldık. Bunu düzeltmek için, hava üstünlüğünü sağlamak üzere yenilikçi gövdeler, motorlar ve silahlar geliştirmek üzere bir Luftfahrtforschungsanstalt veya Havacılık Araştırma Enstitüsü inşa etmeliyiz."
 GER_dive_bombers: "Dalma Bombardıman Uçakları"
 GER_dive_bombers_desc: "$GER_tactical_air_effort_desc$"
 GER_tactical_bombers: "Taktik Bombardıman Uçakları"
 GER_tactical_bombers_desc: "$GER_strategic_air_effort_desc$ Sınırlarımızın dışındaki her fabrikayı yerle bir etmek, yalnızca bizim etkili bir orduya sahip olabilmemizi garanti edecektir."
 GER_uralbomber_program: "Uralbomber Programı"
 GER_uralbomber_program_desc: "Zafer, düşmanlarımıza nerede olurlarsa olsunlar ulaşabildiğimizde elde edilecektir. Ural Dağları'na uçabilen bir uçak geliştirmek, neredeyse tüm potansiyel düşmanları menzilimize sokacaktır."
 GER_aerodynamic_research_institute: "Aerodinamik Araştırma Enstitüsü"
 GER_aerodynamic_research_institute_desc: "[ROOT.GetNameDefCap] son zamanlarda Hava Kuvvetlerimize yoğun yatırım yaptığımız için hava yeniliğiyle eş anlamlı hale geldi. Rekabette önde kalmak için bu alana kaynak akıtmaya devam etmeliyiz. Aerodinamik Araştırma Enstitüsü'nü ve yeni itki teknikleri geliştirmelerini finanse etmek, göklerin efendisi olma arayışımızda kesinlikle yeni yenilikler getirecektir."
 GER_aerodynamic_research_institute_tt: "Tüm §YUçak Tasarımcıları§! için MİO özelliği §Y$GER_mio_trait_aerodynamic_research_insitute$§!'nin kilidini açar. §RAncak yalnızca birine uygulanabilir§!."
 GER_fallschirmjager: "Fallschirmjäger"
 GER_fallschirmjager_desc: "Hava indirme birliklerinin, yani Fallschirmjäger'in stratejik önemi gözümüzden kaçmadı. Bu seçkin paraşütçüleri düşman hatlarının gerisine hızlı konuşlandırma için eğitmek, çok yönlülüklerini ve savaş hünerlerini artıracak ve genel saldırı yeteneklerimizi güçlendirecektir."
 GER_unlocks_eben_emael_raid_tt: "§YEben Emael§! üzerine §YParaşütçü Baskını§!'nın kilidini açar!"
 GER_form_the_jagdwaffe: "Jagdwaffe'yi Kur"
 GER_form_the_jagdwaffe_desc: "Hava üstünlüğünü sağlamak için özel bir avcı uçağı gücü olan Jagdwaffe'yi kurmalıyız. Titiz eğitim, gelişmiş taktikler ve en son teknolojiyi birleştirerek göklere hükmedecek ve kara kuvvetlerimizin savaş alanında ilerlemesine, yeri gök gürültüsü gibi sarsmasına olanak tanıyacağız."
 GER_reorganize_the_luftwaffe: "Luftwaffe'yi Yeniden Düzenle"
 GER_reorganize_the_luftwaffe_desc: "Hava Kuvvetlerimiz sadece birkaç yıl önce kurulmuş olmasına rağmen, ulusal gücün müthiş bir aracı haline geldi. Ancak, hızlı oluşumu ve süratli genişlemesi organizasyonda birkaç yapısal hata bıraktı. Daha fazla sorumluluk devretmek ve rekabetçiliği ve iç güç mücadelesini caydırmak, Hava Kuvvetlerimizi daha büyük operasyonel verimlilik ve etkinlik elde etme konusunda güçlendirecektir."
 GER_solve_the_logistical_bottlenecks: "Lojistik Darboğazları Çöz"
 GER_solve_the_logistical_bottlenecks_desc: "Hava Kuvvetleri yeniden düzenlemesi tamamlandığında, dikkatimizi etkisiz lojistik sisteme ve tedarik zincirlerine çevirebiliriz. Bu sorunları düzene sokmak, daha fazla insanın başka şeyler yapmasını sağlayacak ve uçaklarımızın daha hızlı onarılmasını kolaylaştıracaktır."
 GER_experimental_rotorcrafts: "Deneysel Döner Kanatlılar"
 GER_experimental_rotorcrafts_desc: "En son tasarımlara yatırım yaparak ve yeni teknolojiler geliştirerek, savaş alanında hava hareketliliğini devrimleştirecek erken prototipler geliştirmeye çalışıyoruz. Helikopter olarak adlandırılan dikey kalkış ve iniş yeteneklerini verimli bir şekilde dönüştürmeyi hedefliyoruz."
 GER_develop_the_knickebein: "Knickebein'ı Geliştir"
 GER_develop_the_knickebein_desc: "Karmaşık bir radyo navigasyon sistemi kullanarak, uçaklarımızı daha doğru hassas bombardıman yapmak üzere yönlendirmenin bir yolunu bulduk. Bu yeni teknolojileri kullanarak, düşmanımızın fabrikalarını daha etkili bir şekilde yerle bir edebiliriz - hatta gece bile."
 GER_defense_of_the_reich: "[GetDefenseofGermanyName]'ın Savunması"
 GER_defense_of_the_reich_fascism: "Reich"
 GER_defense_of_the_reich_neutral: "İmparatorluk"
 GER_defense_of_the_reich_democratic: "[GER.GetName]"
 GER_defense_of_the_reich_communism: "Proleter Devrim"
 GER_defense_of_the_reich_desc: "Vatanı düşman hava saldırılarından korumalıyız. [ROOT.GetNameDef] üzerindeki gökleri güvence altına almak ve yerdeki sanayileri korumak her şeyden önce gelmelidir!"
 GER_construct_the_kammhuber_line: "Kammhuber Hattını İnşa Et"
 GER_construct_the_kammhuber_line_desc: "Düşman bombardıman ve avcı uçaklarının [ROOT.GetNameDef] üzerindeki göklerde serbestçe dolaşmasına izin veremeyiz. Onları ana topraklarımıza ulaşmadan önce durdurabilmek için Fransa kıyısı boyunca bir savunma hattı inşa etmeliyiz."
 GER_controls_atlantic_coast_brittany_finnmark_tt: "§Y[ROOT.GetName]§! veya bir Alman vasalı, §Y[14.GetName]§!'dan §Y[925.GetName]§!'a kadar §YAtlantik kıyısı§! boyunca Alman olmayan bir eyaleti tamamen kontrol ediyor."
 GER_controls_atlantic_coast_brittany_finnmark_effects_tt: "§YAvrupa Atlantik kıyısı§! boyunca kontrol edilen her eyalet: §G1§! §Y$anti_air_building$§! ekle. Mevcut etki:"
 GER_establish_night_fighter_squadrons: "Gece Avcı Filoları Kur"
 GER_establish_night_fighter_squadrons_desc: "Vatan savunmamızın bir sonraki adımı olarak, Nachtjagdgeschwader, yani Gece Avcı Filoları oluşturmalıyız. Havadan radar kullanmak, onları gündüz ve gece göklerimizi düşmandan arındırma arayışlarında etkili kılacaktır."
 GER_torpedobomber: "Torpedobomber"
 GER_torpedobomber_desc: "$naval_air_effort_desc$"
 GER_establish_carrier_groups: "Taşıyıcı Grupları Kur"
 GER_establish_carrier_groups_desc: "Rakipsiz bir uçak gemisi filosu yaratmaya kararlı olarak, pilotlarımızı bu güvertelerden operasyon yapmak üzere eğitmeliyiz. Uçaklarımız hem deniz hem de kara üzerindeki göklere hükmedecektir!"
 GER_rocketry_innovations: "Roketçilik Yenilikleri"
 GER_rocketry_innovations_desc: "Havacılık gelişimindeki bir sonraki büyük sıçrama elimizin altında! Mühendislerimiz roket itkisini mükemmelleştirmek için yorulmadan çalıştılar, bu da göklerin efendisi olma arayışımızda büyük sonuçlar ve faydalar sağlayabilir."
 GER_amerikabomber: "Amerikabomber"
 GER_amerikabomber_desc: "Gökyüzüne hakim olma ve düşmanlarımızı kendi topraklarının derinliklerindeki hedefleri vurarak şok edebilecek uzun menzilli bir uçak yaratma konusundaki iddialı hedefe tam olarak bağlı kalmalıyız - ya da Atlantik'i geçerek kimsenin menzilimizden güvende olmadığını herkese göstermeliyiz."
 GER_war_with_american_country_tt: "Bir §YAmerikan§! ülkesiyle savaşta"
 GER_unlocks_statue_of_liberty_raid_tt: "§Y[USA.GetNameWithFlag]§! ile savaş halindeyken §YÖzgürlük Heykeli§! üzerine §YHava Saldırısı§!'nın kilidini açar!"
 #KRIEGSMARINE
 GER_strengthen_the_kriegsmarine: "[GetStrengthenKriegsmarineName]'yi Güçlendir"
 GER_strengthen_kriegsmarine_fascism: "Kriegsmarine"
 GER_strengthen_kriegsmarine_neutrality: "Kaiserliche Marine"
 GER_strengthen_kriegsmarine_democratic: "Deutsche Marine"
 GER_strengthen_kriegsmarine_communism: "Volksmarine"
 GER_strengthen_the_kriegsmarine_desc: "$GER_naval_rearmament_desc$"
 GER_expand_kriegsmarinewerft: "[GetKriegsmarinewerftName]'yi Genişlet"
 GER_expand_kriegsmarinewerft_fascism: "Kriegsmarinewerft"
 GER_expand_kriegsmarinewerft_neutrality: "Kaiserliche Marinewerft"
 GER_expand_kriegsmarinewerft_democratic: "Marinewerft"
 GER_expand_kriegsmarinewerft_communism: "Volksmarinewerft"
 GER_expand_kriegsmarinewerft_desc: "Düşmanlarımızınkine rakip bir donanma inşa etme çabalarımızı iki katına çıkarmalıyız. Gemi yapımının ön saflarındaki teknolojileri konuşlandırarak ve son teknoloji savaş gemileri inşa ederek, açık denizlerin kontrolünü kesinlikle düşmanlarımızın kontrolünden alacağız."
 GER_construct_aircraft_carriers: "Uçak Gemileri İnşa Et"
 GER_construct_aircraft_carriers_desc: "Adına layık her büyük ve modern donanmanın filosunda uçak gemileri olmalıdır. Bu gemiler denizlere hükmetmek için giderek daha önemli hale gelecektir, bu yüzden düşmanlarımızın gerisinde kalmamak için iddialı bir uçak gemisi inşa programı başlatmalıyız."
 GER_carrier_variants_tt: "§Y$early_ship_hull_carrier$§!, §Y$basic_ship_hull_carrier$§! veya §Y$ship_hull_carrier_2$§! teknolojisine bağlı olarak Taşıyıcı §Yvaryantı§! ve §Yüretim hattı§! oluştur. Mevcut etki:\n"
 GER_grosskampfschiff_construction: "Grosskampfschiff İnşaatı"
 GER_grosskampfschiff_construction_desc: "$GER_pride_of_the_modern_germany_desc$"
 GER_high_seas_fleet: "Açık Deniz Filosu"
 GER_high_seas_fleet_desc: "İddialı hedefimiz [ROOT.GetNameDef]'i gerçekten küresel bir güç yapmaktan başka bir şey olamaz. Bu amaçla, bir zamanlar Kraliyet Donanması'nın okyanuslardaki hakimiyetine neredeyse rakip olan Hochseeflotte'yi veya Açık Deniz Filosu'nu yeniden canlandırmalıyız."
 GER_unlock_trade_interdiction_tt: "§Y$GER_trade_interdiction$§! odağının kilidini açar."
 GER_re_establish_the_seekriegsleitung: "Seekriegsleitung'u Yeniden Kur"
 GER_re_establish_the_seekriegsleitung_desc: "Seekriegsleitung'u, yani Deniz Kuvvetleri Komutanlığı'nı yeniden kurmak, deniz emirlerinin planlanmasını ve uygulanmasını ve doğrudan konuşlandırmayı etkili hale getirecektir."
 GER_marinestosstrupp: "Marine Stosstrupp'u Kur"
 GER_marinestosstrupp_desc: "Deniz gücümüzü denizaşırı ülkelere genişletmek istiyorsak, cesur deniz çıkarmaları yapabilen ve düşmanın kıyı savunmalarını yarabilen deniz şok birlikleri olarak adlandırılan bir deniz piyade birimi oluşturmalıyız."
 GER_atlantic_naval_bases: "Atlantik Deniz Üsleri"
 GER_atlantic_naval_bases_desc: "Atlantik kıyı bölgelerinin stratejik önemini kabul ederek ve Atlantik Okyanusu üzerinde hakimiyet kurma çabalarımızın bir parçası olarak, deniz üstünlüğü arayışında deniz üslerinin genişletilmesini ve modernizasyonunu önceliklendirmeliyiz."
 GER_naval_bases_along_atlantic_coast_tt: "§YAvrupa Atlantik kıyısı§! boyunca §Y[ROOT.GetName]§! veya Alman vasalı tarafından kontrol edilen her eyalet: §G1§! §Y$naval_base$§! ekle. §G1§! §Y$coastal_bunker$§! ekle. Mevcut etki:"
 GER_atlantic_naval_dominance: "Atlantik Deniz Hakimiyeti"
 GER_atlantic_naval_dominance_desc: "Atlantik Okyanusu'ndaki hakimiyetimizi güvence altına almak için operasyonel menzilimizi daha da genişletmeli ve deniz varlığımızı kıyıdan kıyıya yaymalıyız."
 GER_controls_an_atantic_island_tt: "§Y[ROOT.GetName]§! veya Alman vasalı, Kuzey Atlantik Okyanusu'nda bir adayı tamamen kontrol ediyor"
 GER_naval_bases_on_atlantic_islands_tt: "§YKuzey Atlantik Okyanusu§!'nda §Y[ROOT.GetName]§! veya Alman vasalı tarafından kontrol edilen ve §Y$naval_base$§! bulunan her ada: §G1§! §Y$naval_base$§! ekle. §G1§! §Y$coastal_bunker$§! ekle. Mevcut etki:"
 GER_trade_interdiction: "Ticaret Önleme"
 GER_trade_interdiction_desc: "Düşman ikmal hatlarını bozmak ve savaş çabalarını zayıflatmak için, savaşma yeteneklerini sekteye uğratmak üzere bir ticaret önleme stratejisi izlemeliyiz. Yüzey filomuzu ve U-botlarımızı deniz boyunca konuşlandırarak, hayati kaynakların ve ticaret gemilerinin nakliyesini önleyecek ve düşmanlarımızı boyun eğmeye zorlayacağız."
 GER_cruiser_warfare: "Kruvazör Savaşı"
 GER_cruiser_warfare_desc: "Hafif kruvazörlerimiz sadece eskort görevlerine indirgenmekten daha faydalı olabilir; düşmanlarımızın konvoylarını kesmek ve endüstriyel yeteneklerini felç etmek için onları açık denizlere göndermeliyiz."
 GER_panzerschiff_raiders: "Panzerschiff Akıncıları"
 GER_panzerschiff_raiders_desc: "Ticaret önleme stratejimizde daha ağır gemilerimizi kullanmalıyız. Bu gemiler sert vurabilir ve düşmanın ana savaş filosu limandan ayrılma şansı bulamadan geri çekilebilir."
 GER_wolfpack_tactics: "Kurt Sürüsü Taktikleri"
 GER_wolfpack_tactics_desc: "Denizaltılarla konvoylara saldırma fikri yeni değil ve Büyük Savaş sırasında kullanıldı, ancak yeni bir taktik önerildi. Bu yeni yaklaşım, U-botlarımızın ticaret gemilerini bulmak ve batırmak için bir Rudel, bir sürü halinde işbirliği yapmasını sağlayacaktır. Bu, düşmanı hammaddelerden ve bu savaşı sürdürme yeteneğinden mahrum bırakmanın anahtarı olabilir."
 GER_u_boat_efforts: "U-Bot Çabaları"
 GER_u_boat_efforts_desc: "Kurt Sürüsü taktiklerinin başarıları, Deniz Yüksek Komutanlığını bu yaklaşıma iki katına çıkmaya ve açık denizlerde zaferimizi güvence altına almak için daha fazla ve daha iyi U-bot inşa etmeye odaklanmaya ikna etti."
 GER_unrestricted_convoy_raiding: "Sınırsız Konvoy Akıncılığı"
 GER_unrestricted_convoy_raiding_desc: "Konvoy akıncılığı verimliliğimizi iki katına çıkarmalı ve denizleri tam kontrolümüz altına almak için planlama çabalarımızı üç katına çıkarmalıyız!"
 GER_unlock_plan_z_tt: "§Y$GER_plan_z$§! odağının kilidini açar."
 GER_with_panzerschiff_completed_tt: "§Y$GER_panzerschiff_raiders$§! tamamlandığında:"
 GER_with_u_boat_efforts_completed_tt: "§Y$GER_u_boat_efforts$§! tamamlandığında:"
 GER_seeherrschaft: "Seeherrschaft"
 GER_seeherrschaft_desc: "Okyanusların tartışmasız efendileri olma ve Seeherrschaft veya deniz hakimiyeti vizyonumuzu gerçekleştirme yolunda ilerliyoruz. Artık [ROOT.GetNameDef] dalgalara hükmediyor!"

 GER_remilitarize_the_rhineland: "Ren Bölgesini Yeniden Askerileştir"
 GER_remilitarize_the_rhineland_desc: "$GER_rhineland_desc$"
 GER_legion_condor: "Legion Condor"
 GER_legion_condor_desc: "İber yarımadasında iç savaş sürerken bize büyük bir fırsat doğuyor. Onlara gönderebildiğimiz kadar çok gönüllü göndererek sadece doğru tarafın kazanmasını sağlamakla kalmaz, aynı zamanda birliklerimize savaş alanı deneyimi sunabilir ve ideallerimizi paylaşan [SPR.GetAdjective] halkını bize daha da yaklaştırabiliriz."
 GER_reorganize_secret_services: "Gizli Servisleri Yeniden Düzenle"
 GER_reorganize_secret_services_desc: "$GER_wilhelm_canaris$ verimsiz, hatta söylentilere inanılacak olursa mevcut hükümete karşı açıkça sadakatsiz olduğunu kanıtladı. Onu görevden almalı ve Abwehr'i daha yetkin bir kuruma yeniden düzenlemeliyiz."
 GER_fuhrerprinzip: "Führerprinzip"
 GER_fuhrerprinzip_desc: "Führer, en yakınlarından tam sadakat bekler, ancak güvendiği kişiler arasında olanlar, hiç kimsenin üzerinde durdukları taşlardan daha değerli olmadığını unutmamalıdır. Führer'in isteklerine uygun hareket etmede tek bir yanlış adım veya başarısızlık vahim sonuçlar doğurabilir. Rotamızı yalnızca Führer belirleyecektir."
 GER_party_chancellor_hess: "Parti Şansölyesi Hess"
 GER_party_chancellor_hess_desc: "Rudolf Hess uzun süredir partinin aktif bir üyesidir. Siyasi seçkinlerin birçok ileri gelen üyesinin, Führer'in kendisi de dahil olmak üzere, güvenine sahiptir. Parti Şansölyesi görevine atanması onun hakkıdır."
 GER_party_chancellor_bormann: "Parti Şansölyesi Bormann"
 GER_party_chancellor_bormann_desc: "Martin Bormann, Führer Yardımcısı'nın özel sekreteri olarak görevinde son derece yetenekli olduğunu kanıtlamıştır. Ayrıca daha önce NSDAP için bir yardımcı fon olan Hilfskasse der NSDAP'ı yönetmekten edindiği oldukça geniş maliye bilgisiyle, mükemmel bir Parti Şansölyesi olacaktır."
 GER_mega_reichskommissariats: "Mega Reichskommisariat"
 GER_mega_reichskommissariats_desc: "Reichskommisariatların son derece faydalı bir girişim olduğu kanıtlandığından, liderimiz [ROOT.GetLeader]'in daha fazla iyileştirme üzerinde çok zaman harcaması şaşırtıcı değil. Reichskommisariatlarla ilgili sorunlardan biri artan sayıları ve bununla birlikte onları yönetmek için gereken artan idare miktarıdır. Elbette bazıları birleştirilebilir..."
 GER_optimize_reich_labour_service: "Reich Hizmetini Optimize Et"
 GER_optimize_reich_labour_service_desc: "Reich İşçi Servisi, nüfusumuzu istihdamda tutmada büyük bir amaca hizmet ediyor ancak daha fazlası için kullanılabileceğini düşünüyoruz. RAD kullanımımızı optimize ederek emek, propaganda ve savaş hazırlığı gibi her açıdan en iyi şekilde yararlandığımızdan emin olabiliriz."
 GER_ascension_of_himmler: "$GER_inner_circle_member_title$ Himmler"
 GER_ascension_of_himmler_desc: "Heinrich Himmler'in organizasyonu ve liderliği altında SS, oldukça küçük başlangıcından ülkemiz içinde daha belirgin bir güce dönüştü. Onu terfi ettirmek, becerilerinden daha fazla yararlanmamızı ve mevcut haliyle SS'i daha iyi kullanmamızı sağlayacaktır."
 GER_expand_ss_recruitment: "SS Askere Alımını Genişlet"
 GER_expand_ss_recruitment_desc: "SS'e katılma gereksinimleri yüksektir ve sürecin kendisi bir iğne deliğinden geçmek zorunda kalmak olarak tanımlanmıştır. En kaliteli gücü sağlamak için gereksinimler yüksek kalmalıysa da, işe alım standartlarımızı düşürmeyi gerektirmeyen başka yollarla genişletilebilir."
 GER_create_four_militia_units_tt: "§Y4 Alman Milis§! birimi oluştur"
 GER_create_two_motorized_units_tt: "§Y2 Alman Motorize§! birimi oluştur"
 GER_SS_recruitment_tt: "Kararın kilidini açar: §Y$SS_recruitment$§!"
 GER_strengthen_the_waffen_ss: "Waffen-SS'i Güçlendir"
 GER_strengthen_the_waffen_ss_desc: "SS'in savaş kolu olan Waffen-SS, savaş sırasında bizim için değerli bir varlık olduğunu kanıtlamıştır. Teknik olarak bir paramiliter kol olmasına rağmen, daha fazla kaynak verildiğinde normal ordumuz kadar etkili bir şekilde faaliyet gösterebileceklerine kesinlikle inanıyoruz."
 GER_create_two_militia_units_tt: "§Y2 Alman Milis§! birimi oluştur"
 GER_create_one_motorized_units_tt: "§Y1 Alman Motorize§! birimi oluştur"
 GER_create_two_light_panzer_units_tt: "§Y2 Alman Hafif Zırhlı§! birimi oluştur"
 GER_create_two_medium_panzer_units_tt: "§Y2 Alman Orta Zırhlı§! birimi oluştur"
 GER_expand_ss_security_duties: "SS Güvenlik Görevlerini Genişlet"
 GER_expand_ss_security_duties_desc: "SS, Heinrich Himmler'in rehberliğinde istikrarlı bir şekilde büyürken, güvenliğimiz için daha büyük bir sorumluluk alma zamanı geldi. Görevlerinin genişlemesine izin vererek, başka yerlerde kullanmak üzere kaynakları serbest bırakabiliriz."
 GER_hegemony_of_the_ss: "SS Hegemonyası"
 GER_hegemony_of_the_ss_desc: "Artan askere alım ve daha iyi teçhizatla SS artık savaş alanında müthiş bir güçtür. Himmler'in liderliği altında grup, beklentilerimizin çok ötesinde şeylere muktedir, en belirgin varlıklarımızdan biri haline geldi. Onlara şimdi sahip oldukları gücü emanet etmek akıllıca bir karardı, ileriye dönük olarak başarı için gerekli araçları onlara sağlamaya devam etmeliyiz."
 GER_expand_gestapo: "Gestapo'yu Genişlet"
 GER_expand_gestapo_desc: "Gestapo, siyasi muhalefet ve diğer baş belalarıyla başa çıkmada son derece yetenekli olduğunu kanıtlamıştır. Onu genişleterek, nüfusumuzun mevcut yasalara ve beklentilere uygun hareket etmesini sağlayabiliriz."
 GER_absorb_the_abwehr: "Abwehr'i İçine Al"
 GER_absorb_the_abwehr_desc: "Abwehr'i Ordu Komutanlığı'ndan ayrı tutmak, karar verildiği sırada mantıklı bir karardı. Mevcut durumla birlikte, tam tersinin doğru olabileceği görülüyor. Abwehr'i içimize almayı düşünmeliyiz."
 GER_innovative_warfare: "Yenilikçi Savaş"
 GER_innovative_warfare_desc: "Savaş yapma yöntemlerimiz sürekli gelişmeli yoksa durgunlaşma riskiyle karşı karşıya kalırız. Yalnızca sürekli evrim ve değişimle düşmanlarımızın taktiklerimize ve teknolojimize akıl erdirmesini engelleyebiliriz."
 GER_form_organization_todt: "Todt Organizasyonunu Kur"
 GER_form_organization_todt_desc: "Führer'in yapılmasını istediği birkaç büyük inşaat projesi olmasına rağmen, çoğu beklemek zorunda kalacak. En acil olarak [ROOT.GetNameDef] daha fazla askeri sanayiye şiddetle ihtiyaç duyuyor. Planlama Fritz Todt'un elinde olduğunda, sonucun iyi olacağından eminiz."
 GER_employ_philipp_holzmann: "Philipp Holzmann'ı İşe Al"
 GER_employ_philipp_holzmann_desc: "Albert Speer, Führer'in üstlenmek istediği birkaç büyük inşaat projesi için Philipp Holzmann AG'yi işe alma fikrini ortaya attı. Şirketin iyi bir itibarı ve uzun bir geçmişi var, Hamburg Belediye Binası ve orijinal Reichstag gibi mimari şaheserler inşa etmişler. İhtiyaçlarımız için iyi bir uyum olacaklar!"
 GER_prioritize_the_four_year_plan: "Dört Yıllık Plana Öncelik Ver"
 GER_prioritize_the_four_year_plan_desc: "Başından beri [ROOT.GetLeader]'in Dört Yıllık Planı'nın ulusu savaşa hazırlamak için gerekli bir adım olacağını biliyorduk. Führer'in kendisi çok meşgul bir adam olduğundan, gerekli önlemleri denetlemek ve koordine etmek için birine ihtiyaç duyulacaktır."
 GER_plenipotentiary_of_the_four_year_plan: "Dört Yıllık Plan Tam Yetkili Temsilcisi"
 GER_plenipotentiary_of_the_four_year_plan_desc: "Dört Yıllık Plan'ın yürütülmesini denetleme ve etkili hale getirme işinin başlangıçta düşünülenden daha kapsamlı bir görev olduğu ortaya çıktı. Hermann Göring'i bir Reich Tam Yetkili Temsilcisi yaparak tek bir adama çok fazla güç veriyoruz, ancak büyük sonuçlarına bakıldığında Führer emin. Hermann Göring, bu konuda ona tam diplomatik haklar vermememiz için çok faydalı."
 GER_autonomous_organization_todt: "Özerk Todt Organizasyonu"
 GER_autonomous_organization_todt_desc: "Fritz Todt'un girişimi olan Todt Organizasyonu son derece etkili olduğunu kanıtlamıştır. İnşaat projeleri, Führer'in kendisinin bile memnun olduğu bir dereceye kadar hızla tamamlanmaktadır. Silahlanma ve Savaş Üretimi Reich Tam Yetkili Temsilcisi statüsü verildiğinde, Todt ülkemiz için gerçek bir varlık haline gelebilir."
 GER_plenipotentiary_of_armaments: "Silahlanma Tam Yetkili Temsilcisi"
 GER_plenipotentiary_of_armaments_desc: "Wehrmacht'ın ihtiyaç duyduğu şeyleri sağlama konusunda genel sorumluluğu birinin üstlenmesi gerektiği giderek daha açık hale geliyor. Albert Speer, Wehrmacht'ı tedarik etme çabalarında son derece umut verici sonuçlar göstermiştir. Silahlanma ve Savaş Üretimi Reich Tam Yetkili Temsilcisi statüsü verildiğinde, bu adam mucizevi derecede iyi sonuçlar elde edebilir!"
 GER_integration_of_puppet_economies: "Kukla Ekonomilerinin Entegrasyonu"
 GER_integration_of_puppet_economies_desc: "Vasallarımızın nasıl durumda olduğuna baktığımızda, ekonomilerini ne kadar kötü yönettikleri açıkça görülüyor. Elbette bu durum esas olarak onları etkilese de, dolaylı olarak bizim ekonomimizi de aşağı çekiyorlar. Führer, eldeki sorunla ilgili bir şeyler yapılmasını talep ediyor!"
 GER_ministry_of_public_enlightenment: "Kamuoyu Aydınlatma Bakanlığı"
 GER_ministry_of_public_enlightenment_desc: "Propaganda Bakanlığı son zamanlarda bize büyük hizmetlerde bulundu. Propaganda Bakanlığı'nı Kamuoyu Aydınlatma Bakanlığı olarak yeniden markalaştırarak görevlerini genişletebilmeli ve endişe yaratmadan finansmanı artırabilmeliyiz."
 GER_fund_the_film_department: "Film Departmanını Finanse Et"
 GER_fund_the_film_department_desc: "Film, insanları ilham vermek ve yönlendirmek için güçlü bir araç olduğunu kanıtlamıştır. Vatansever filmler üreterek ve tanıtarak, ulusumuzu şanlı [ROOT.GetName]'imize tam olarak adamaya teşvik edeceğiz!"
 GER_the_triumphant_will: "Muzaffer İrade"
 GER_the_triumphant_will_desc: "$GER_improve_national_spirit_desc$"
 GER_propaganda_master: "Propaganda Ustası"
 GER_propaganda_master_desc: "Joseph Goebbels'i Propaganda Bakanımız olarak atadığımızda hiç şüphemiz yoktu. Zaten başarılı bir konuşmacı ve yazardı. Şimdi istihbarat teşkilatımızı nasıl iyileştireceğimize dair fikirler dile getirdiğinde, bu fikirlere göre hareket etmenin bizim çıkarımıza olduğuna tam olarak inanıyoruz."
 GER_bribe_senior_officers: "Kıdemli Subaylara Rüşvet Ver"
 GER_bribe_senior_officers_desc: "Kıdemli subaylarımızın Führer'e sadakatini sağlamak için sadakati ve itaati ödüllendirmeyi düşünmeliyiz. Para, toprak ve vergi muafiyetleri sunarak, sadece sadık kalmalarını değil, aynı zamanda kendi işlerine bakmalarını ve Führer'lerini sorgulamamalarını da sağlarız."
 GER_army_indoctrination: "Ordu Beyin Yıkama"
 GER_army_indoctrination_desc: "Rüşvet ve parasal teşvikler kıdemli subaylarımız ve Wehrmacht içindeki seçkin bireyler için harika çalışıyor. Ancak, sıradan asker için rüşvete güvenemeyiz yoksa ekonomimiz mahvolur. Propaganda çabalarıyla onları kararlarımıza tamamen katılmaya ikna etmek daha mantıklı bir hareket tarzı olabilir."
 GER_autonomy_in_the_kriegsschulen: "Kriegsschulen'de Özerklik"
 GER_autonomy_in_the_kriegsschulen_desc: "Savaş Akademileri veya Kriegsschulen, ülkemizde uzun bir geleneğe sahiptir. Akademilerde sağlanan eğitimin her zerresini yönetmek ve uyarlamak cazip gelse de, gelecekteki subaylarımız için mümkün olan en iyi eğitimi sağlamak üzere okullara izin vermek ve onları güçlendirmek daha iyi olabilir."
 GER_strafbataillon: "Strafbataillon"
 GER_strafbataillon_desc: "Orduda beyin yıkama önlemleri aldıktan sonra, bunu sadece askerlerimizi bize sadık kılmaktan daha fazla şekilde kullanabiliriz. Ceza taburları konuşlandırarak, hem beyin yıkama yoluyla hem de Vatan'a hizmet etmelerini sağlayarak bu bireylerde istenen milliyetçi duyguları besleyebiliriz!"
 GER_expand_the_truppenschulen: "Truppenschulen'i Genişlet"
 GER_expand_the_truppenschulen_desc: "Uzman subaylara yönelik artan taleplere ayak uydurmak için hizmet kolu okullarımız büyük ölçüde genişletilmelidir. Subay adaylarımıza mümkün olan en iyi eğitimi sağlamak, savaş alanındaki başarımızı garantileyecektir."
 GER_demonstration_of_military_achievements: "Askeri Başarıların Gösterimi"
 GER_demonstration_of_military_achievements_desc: "Tarihimiz büyük askeri başarılarla doludur. Birliklerimizin şu anda elde ettiklerinin bu büyük askeri başarılardan bir diğeri olacağını kabul ederek morali yükseltebilir ve bize olan sadakatlerini daha da artırabiliriz."
 GER_demonstration_of_military_achievements_trigger: "Aşağıdakilerden biri doğru olmalı:\n   §Y2§!'den fazla Tabi ulus\n   §YAvrupa§!'da §Y19§!'dan fazla işgal edilmiş eyalet" #TODO_Danne bu sayıları bir değişkene dönüştür!
 GER_country_leader_change_blocks_progress_demonstration_military_achievement_tt: "§Y$GER_demonstration_of_military_achievements$§! tamamlandıktan sonra Ülke Liderini değiştirmek, §Y$GER_an_invincible_army$§! ve §Y$GER_the_supreme_leader$§!'nin tamamlanmasını §Rengelleyecektir§!"
 GER_an_invincible_army: "Alman Ordusu, Yenilmez"
 GER_an_invincible_army_desc: "Ordumuzun savaş alanında kazandığı birçok başarı ve zafer sayesinde, düşman demagoglarının ne derse desin, [ROOT.GetAdjective] ordusunun gerçekten yenilmez olduğunu dünyaya kanıtladık!"
 GER_country_leader_change_blocks_progress_invincible_army_tt: "§Y$GER_an_invincible_army$§! tamamlandıktan sonra Ülke Liderini değiştirmek, §Y$GER_the_supreme_leader$§!'nin tamamlanmasını §Rengelleyecektir§!"
 GER_an_invincible_army_trigger: "Aşağıdakilerden biri doğru olmalı:\n   §Y5§!'ten fazla Tabi ulus\n   §YAvrupa§!'da §Y49§!'dan fazla işgal edilmiş eyalet"
 GER_the_supreme_leader_trigger: "[ROOT.GetNameDefCap] §Y2'den fazla Büyük§! Ülkeyi §YTeslim§! ettirdi"
 GER_the_supreme_leader: "Yüce Lider"
 GER_the_supreme_leader_desc: "Yönlendirilmiş reformlar ve canlandırma programları sayesinde Wehrmacht'ın [ROOT.GetLeader]'e ve davasına olan sadakati yeni bir zirveye ulaştı. Liderimize ve Vatanımıza yönelik bu tam destek eğilimi devam etmelidir."
 GER_a_strong_successor: "Güçlü Bir Halef"
 GER_a_strong_successor_desc: "Nöbet değişimi yaklaşıyor ve yeni bir Führer yükselmeli. [ROOT.GetNameDef] için özlemlerimizi yansıtacak yeni bir lider atama fırsatımız var. Bu değişim, Alman halkı için daha parlak bir gelecek getirme çabalarımızı yeniden canlandıracaktır."
 GER_loyalty_to_the_fuhrer: "Führer'e Sadakat"
 GER_loyalty_to_the_fuhrer_desc: "Cumhurbaşkanlığı ve Şansölyelik rollerinin birleştirildiği 1934 referandumuna göre, Hitler'in nüfusumuz arasında muazzam bir desteğe sahip olduğunun farkındayız. Siyasi manzaranın değiştiğine dair hiçbir belirti görmedik ve bu nedenle Führer'i desteklemeye devam edeceğiz."
 GER_heed_von_neuraths_concerns: "von Neurath'ın Endişelerini Dikkate Al"
 GER_heed_von_neuraths_concerns_desc: "Mevcut askeri taktiklerimiz ve politikalarımızla ilgili endişeler, Konstantin von Neurath başkanlığındaki ordumuzun birçok üst düzey üyesi tarafından dile getirildi. Onlara göre, Führer'in ordu için oldukça saldırgan planları tutmayacak ve eğer onları takip edersek ortaya çıkabilecek topyekûn bir savaş riski karşısında ordumuz henüz yeterince güçlü değil."
 GER_reorganize_the_wehrmacht: "Wehrmacht'ı Yeniden Düzenle"
 GER_reorganize_the_wehrmacht_desc: "Führer'in iddialı planlarını takip edebilmemiz için Wehrmacht içinde kapsamlı bir yeniden yapılanma gerçekleşmelidir. Mevcut liderlerin çoğu zamanlarını Führer'in emirlerini yerine getirmek yerine küçük ve temelsiz endişeler dile getirerek harcıyor. Yalnızca bu bireyleri görevden alarak hedeflerimize ulaşılabilir!"
 GER_anschluss: "Anschluss"
 GER_anschluss_desc: "[AUS.GetAdjective] politikacılarının sözlerine rağmen, [AUS.GetNameDef]'in büyük ölçüde [GER.GetAdjective] konuşan nüfusunun Vatan ile yeniden birleşmeyi özlediği açıktır. Yolsuz lider [AUS.GetLeader]'i istifaya zorlamalı ve halkın iradesinin yerine getirilmesine izin vermeliyiz."
 GER_anschluss_army_trigger_tt: "§Y[ROOT.GetAdjective]§! Ordusu, yalnızca uygun şekilde donatılmış birimler sayıldığında §Y[AUS.GetAdjective]§! Ordusundan en az §Y[?global.deployed_manpower_ratio_needed_for_anschluss]§! kat daha büyüktür.\n\nBunu [GetAnschlussProgress] tahmin ediyoruz"
 GER_antischluss_progress_minimal: "§RMinimal§! ilerleme kaydetti"
 GER_antischluss_progress_moderate: "§OOrta düzeyde§! ilerleme kaydetti"
 GER_antischluss_progress_significant: "§YÖnemli§! ilerleme kaydetti"
 GER_antischluss_progress_complete: "§GBaşardı§!"
 GER_austrian_army_does_not_exist: "Şu anda §Y[AUS.GetnameDef]§!'in herhangi bir daimi ordusu bulunmamaktadır."
 GER_befriend_czechoslovakia: "$GER_czech_friend$"
 GER_befriend_czechoslovakia_desc: "$GER_czech_friend_desc$"
 GER_war_preparations: "Savaş Hazırlıkları"
 GER_war_preparations_desc: "Ulusu yaklaşan bir savaşa tam olarak hazırlamak için hazırlıkların sadece Wehrmacht içinde değil, aynı zamanda sanayi ve altyapıda da yapılmasını sağlamalıyız."
 GER_prepare_for_the_next_blockade_ww: "Bir Sonraki Ablukaya Hazırlan"
 GER_prepare_for_the_next_blockade_ww_desc: "Diğer ülkeler hazırlıklarımızın boyutunu fark ettikçe, bazılarının itiraz etmesi kaçınılmazdır. Daha önce ablukalara maruz kaldık ve onlarla nasıl başa çıkacağımızı biliyoruz. Gerekli hazırlıklarla, ablukalarının üzerimizde çok az etkisi olacak veya hiç etkisi olmayacaktır."
 GER_subversive_infiltrators: "Yıkıcı Sızmacılar"
 GER_subversive_infiltrators_desc: "Bir düşman hakkında istihbarat ve bilgi, başarılı bir işgal için çok önemlidir. Pek çok alana harcama yaparken, istihbarat toplamamızı iyileştirmeye yatırım yapmamız da mantıklıdır."
 GER_integrate_czechoslovakia: "Çekoslovakya'yı Entegre Et"
 GER_integrate_czechoslovakia_desc: "[CZE.GetNameDef]'in nasıl yönetildiğine dair daha fazla bilgi edindikçe, halkın bir değişiklik istediği giderek daha açık hale geliyor. [GER.GetNameDef]'e entegrasyon bu çok ihtiyaç duyulan değişikliği sağlayacaktır. Bir ültimatomla bir heyet göndermeliyiz."
 GER_fate_of_czechoslovakia: "$GER_end_of_czechoslovakia$"
 GER_fate_of_czechoslovakia_desc: "$GER_end_of_czechoslovakia_desc$"
 GER_support_a_coup_in_liechtenstein: "Lihtenştayn'da Darbeyi Destekle"
 GER_support_a_coup_in_liechtenstein_desc: "Lihtenştayn'daki benzer düşünen bireylerin mikro ülkedeki naibi devirmeyi planladığına dair haber aldık. Alfons Goop adlı bir adam desteğimizi istemeye geldi ve bundan bizim de faydalanacağımızı garanti ediyor."
 GER_reassert_eastern_claims: "$GER_demand_memel$"
 GER_reassert_eastern_claims_desc: "$GER_demand_memel_desc$"
 GER_expand_claims_in_baltic: "Baltık'taki İddiaları Genişlet"
 GER_expand_claims_in_baltic_desc: "Tarihsel olarak Baltıklar'da önemli bir [ROOT.GetAdjective] diasporası yaşamıştır. Onları [ROOT.GetNameDef]'e geri getirmek hem onların hem de bizim çıkarımızadır!"
 GER_influence_the_baltics: "Baltıkları Etkile"
 GER_influence_the_baltics_desc: "Baltık devletleri bizimle [SOV.GetNameDef] arasında tehlikeli bir şekilde konumlanmıştır. Biraz diplomatik çaba ve karşılıklı yarar sağlayan tekliflerle, çatışmaya gerek kalmadan onları bize daha yakın hale getirebilmeliyiz."
 GER_danzig_for_slovakia: "$GER_danzig_vs_slovakia$"
 GER_danzig_for_slovakia_desc: "$GER_danzig_vs_slovakia_desc$"
 GER_befriend_poland: "$GER_poland_friend$"
 GER_befriend_poland_desc: "$GER_poland_friend_desc$"
 GER_subjugate_romanian_economy: "Romanya Ekonomisini Boyunduruk Altına Al"
 GER_subjugate_romanian_economy_desc: "[ROM.GetNameDefCap] bizim için önemli bir ticaret ortağı haline geldi. Ülke içinde çıkarılan büyük miktardaki ham petrol ülkenin ekonomisini canlandırdı ve şimdi fiyatlarını artırmaya başlıyorlar. Elbette bizim gibi eski, geri dönen bir müşteri için en iyi fiyatları sağlamak üzere biraz baskı uygulayabiliriz?"
 GER_influence_the_benelux: "Benelüks'ü Etkile"
 GER_influence_the_benelux_desc: "Benelüks bölgesi, devam eden savaş çabalarımız için olduğu kadar, endüstriyel yetenekleri ve coğrafi konumları açısından da önem taşımaktadır. Muhtemelen onları kolayca istila edebilecek olsak da, neden bunun yerine onları kendi tarafımıza çekmeyelim?"
 GER_operation_weserubung: "$GER_weserubung$"
 GER_operation_weserubung_desc: "$GER_weserubung_desc$"
 GER_utilize_the_nordliche_gesellschaft: "Nordische Gesellschaft'ı Kullan" # Eskiden İskandinavya ile Dost Ol'du
 GER_utilize_the_nordliche_gesellschaft_desc: "İskandinavya geleneksel olarak tarafsızdır. Eğer diplomatik yollarla elde edebileceğimiz kaynakları almak için başka bir cephe açmaya çalışmanın bir anlamı yok. Bu nedenle, Alman-Nordik kültürel ve siyasi işbirliğini güçlendirmeye yönelik bir dernek olan Alfred Rosenberg'in Nordik Topluluğu'nu, İskandinav ülkeleriyle olumlu konuşmak için kullanmalıyız."
 GER_form_rome_berlin_axis: "Roma-Berlin Mihverini Kur"
 GER_form_rome_berlin_axis_desc: "$GER_italy_ally_desc$"
 GER_invade_italy: "Alarik Operasyonu"
 GER_invade_italy_desc: "İlk bakışta [ITA.GetNameDef] bize iyi bir potansiyel müttefik gibi görünse de, gerçek renklerini biliyoruz. Büyük Savaş'ın başında yanımızda savaşmayı reddettiler ve 1915'te daha önceki ittifakımıza rağmen bize karşı döndüler. O zaman dersimizi aldık, onlara güvenme hatası bir daha yapılmayacak."
 GER_alliance_with_spain: "$GER_nationalist_spain_ally$"
 GER_alliance_with_spain_desc: "$GER_nationalist_spain_ally_desc$"
 GER_operation_felix: "Felix Operasyonu"
 GER_operation_felix_desc: "İspanya İç Savaşı nihayet sona erdiğine göre, [118.GetName]'ı [ENG.GetAdjective]'lerden söküp alma zamanı geldi. Ancak denizden saldıramayacağımız için, önce topraklarından geçmemize izin vermeleri için [SPR.GetAdjective]'lerin sadakatini sağlamalıyız. İdeolojilerimiz göz önüne alındığında, onları boyun eğdirmek zor olmamalı."
 GER_secure_spain_desc: "[SPR.GetNameDef] son derece istikrarsız bir ülke olduğunu kanıtlamıştır. Yönetimle mücadele ederlerken, belki onlara bir yardım eli uzatmalıyız? Bu noktada, kesinlikle bizim kukla rejimimiz olmak, alıştıkları kaostan daha tercih edilir olmalı?"
 GER_alliance_with_portugal: "Portekiz ile İttifak"
 GER_alliance_with_portugal_desc: "Tarihsel olarak [POR.GetNameDef] ile en olumlu ilişkilere sahip olmadık. Ancak Büyük Savaş'ta acı düşmanlar olmamıza rağmen, fikir değiştirmiş gibi görünüyorlar. İspanya'daki milliyetçileri destekledikleri için, ideolojik benzerlikler olabileceğine ve [POR.GetAdjective] ile bir anlaşmaya varabileceğimize inanıyoruz."
 GER_operation_isabella: "Isabella Operasyonu"
 GER_operation_isabella_desc: "Sadece [POR.GetNameDef]'in bizimle İber Yarımadası'nın tam kontrolü arasında durmasıyla, bir sonraki hamlemiz onları bize boyun eğdirmek olmalıdır. Yerel yönetimi korumak ancak bize olan sadakatlerini sağlamak, onlardan toprak, altyapı ve askeri yapılar açısından ihtiyacımız olan her şeyi bize sağlamalıdır."
 GER_secure_portugal_desc: "Büyük Savaş sırasında [POR.GetAdjective]'ler rakiplerimizin propagandasına kapılıp bize karşı döndüler. Eski gemilerimizden bazıları hala limanlarında duruyor ve onları iade etme konusunda tek kelime edilmedi. Şimdi yeterince dostça görünseler de, onlara güvenemeyiz ve onlara savaş istemiyorlarsa, yönetimimize boyun eğme zamanının geldiğini açıkça belirtmeliyiz."
 GER_operation_sea_lion: "Deniz Aslanı Operasyonu"
 GER_operation_sea_lion_desc: "[ENG.GetNameDef]'in coğrafi konumu mevcut savaş çabamızda karmaşık bir faktör olduğunu kanıtlamıştır. Hem havadan hem de denizden topyekûn bir saldırı operasyonu başlatmak, sonunda [ENG.GetAdjective]'leri kırmanın en iyi yolu gibi görünüyor!"
 GER_operation_green: "Yeşil Operasyon"
 GER_operation_green_desc: "Deniz Aslanı operasyonunu desteklemek amacıyla, batı kanadı operasyonel komutanlığımız İrlanda üzerinde tam ölçekli operasyonlar planlamalı ve İngiliz Adaları'nın tamamen kontrolümüz altına girmesini sağlamak için adanın işgaline hazırlanmalıdır. Bu amaçla yüksek komutanlığımız Fall Grün'ü ayrıntılı bir operasyon planı olarak hazırlamıştır."
 GER_challenge_the_monroe_doctrine: "Monroe Doktrinine Meydan Oku"
 GER_challenge_the_monroe_doctrine_desc: "Mesafeleri uzak olsa da, Orta ve Güney Amerika'daki bazı ülkeler ideolojik olarak bize çok yakın. Onlarla iyi ilişkiler kurarak ve sürdürerek ikimiz de büyük ölçüde fayda sağlayabiliriz. Ayrıca, başka bir kıtada bir dayanak noktası oluşturmak gelecek için son derece değerli olabilir."
 GER_shatter_usas_hegemony: "[USA.GetAdjective] Hegemonyasını Parçala"
 GER_shatter_usas_hegemony_desc: "[USA.GetAdjective]'lere uluslararası sahnede çok uzun süredir çok fazla güç verildi. Güçlendikçe, şimdi onların kenara çekilme zamanı geldi."
 GER_challenge_the_monroe_doctrine_tt: "Kararların kilidini açar: §YMonroe Doktrinini İstikrarsızlaştır§!.\n\n§Y[USA.GetNameDef]§!'i bilgilendirir ve §RMüdahale etmeye§! çalışmalarına izin verir."
 GER_challenge_the_monroe_doctrine_tt_2: "En az 7 Ülke hala §YMonroe Doktrini§! aktif"
 GER_establish_protectorates_in_america: "Amerika'da Himayeler Kur"
 GER_establish_protectorates_in_america_desc: "Amerika kıtalarındaki ülkeler çok uzun süredir ideallerimizle uyuşmayan şekillerde yönetildi. Uzun bir süre optimal olmayan yönetimden sonra bu bölgeleri düzene sokmak için tam ölçekli bir yeniden yapılanma gerekecektir."
 GER_demands_to_sweden: "İsveç'e Talepler"
 GER_demands_to_sweden_desc: "Kuzey [SWE.GetNameDef]'deki çelik madenleri askeri sanayimiz için hayati bir varlıktır. [SWE.GetAdjective] ile ticarete devam edip edemeyeceğimizi şansa bırakamayız. Bu ticaret yolu en kısa sürede güvence altına alınmalıdır."
 GER_the_swiss_gold: "İsviçre Altını"
 GER_the_swiss_gold_desc: "[SWI.GetAdjective]'lerin şimdilik herhangi bir küresel çatışmanın dışında kalmaya karar verdikleri göz önüne alındığında, ticaret ve casusluk için mükemmel bir fırsat sunuyorlar. Devletlerinde ajanlar konuşlandırdığımızdan emin olmalı ve elde ettiğimiz altını saklama konusunda potansiyellerini sonuna kadar kullanmalıyız."
 GER_secure_finland: "Finlandiya'yı Güvence Altına Al"
 GER_secure_finland_desc: "[FIN.GetNameDefCap]'ın [SOV.GetNameDef] ile uzun bir kara sınırı vardır. Bu sınıra erişim sağlamak bize doğudaki Kızıl Tehdit'e karşı başka bir potansiyel cephe kazandırır ve [SOV.GetAdjective]'lerle savaşmamız gerekirse çok değerli olabilir."
 GER_befriend_china: "$GER_china_friend$"
 GER_befriend_china_desc: "$GER_china_friend_desc$"
 GER_befriend_japan: "$GER_japan_friend$"
 GER_befriend_japan_desc: "$GER_japan_friend_desc$"
 GER_reclaim_former_african_colonies: "Eski Afrika Sömürgelerini Geri Al"
 GER_reclaim_former_african_colonies_desc: "Daha önce sahip olduğumuz ve o zamandan beri kaybettiğimiz tek yer Asya değil. Afrika'daki topraklarımız hala bizim için ilgi çekici ve onları geri almak ve bir kez daha entegre etmek için elimizden gelenin en iyisini yapmalıyız."
 GER_mittelafrika: "Mittelafrika"
 GER_mittelafrika_desc: "Afrika'da eskiden sahip olduğumuzdan daha fazla ilgi çekici bölge var. Muazzam doğal zenginliğiyle Mittelafrika adını vermeyi seçtiğimiz bölge [ROOT.GetNameDef]'e büyük fayda sağlayacaktır."
 GER_mittelafrika_revive_the_schutztruppe_tt: "§YAfrika§!'da §YSchutztruppe§! sömürge milislerinin ve onları §YAskere Alma§! ve §Yİyileştirme§! kararlarının kilidini açar"
 GER_asia_revive_the_schutztruppe_tt: "§YAsya§!'da §YSchutztruppe§! sömürge milislerinin ve onları §YAskere Alma§! ve §Yİyileştirme§! kararlarının kilidini açar"
 GER_re_establish_german_control_over_qingdao: "Qingdao Üzerindeki Alman Kontrolünü Yeniden Kur"
 GER_re_establish_german_control_over_qingdao_desc: "1898'de Qingdao'nun kiralanması konusunda anlaştık. Bu kiralama, Büyük Savaş'ın başlamasından kısa bir süre sonra 1914'te [JAP.GetAdjective] işgaliyle kısa kesildi. Bölge artık işgal altında olmadığına göre, belki onlara anlaşmayı hatırlatma zamanı gelmiştir."
 GER_claim_old_colonies_in_the_east: "Doğudaki Eski Sömürgeleri Talep Et"
 GER_claim_old_colonies_in_the_east_desc: "Versay Antlaşması bizi sömürgelerimizden mahrum etti ve bunları Müttefik uluslara dağıttı. Halkımız, tıpkı bizim gibi, bunun yasa dışı olduğunu düşündüklerini açıkça belirtti. Doğu'da diplomatik ilişkiler kurmanın bir parçası olarak, sömürgelerimizi geri almayı denemeyi de düşünmeliyiz."
 GER_ally_chiang_kai_shek: "Chiang Kai-Shek ile İttifak Kur"
 GER_ally_chiang_kai_shek_desc: "Doğu Asya'daki mevcut girişimlerimiz sadece bize fayda sağlamayabilir. [CHI.GetNameDef]'in lideri [CHI.GetLeader]'i müttefik yaparak ve onu bize yakınlaştırarak etki alanımızı genişletir ve bölgedeki sömürge büyümesini kolaylaştırırız."
 GER_japanese_naval_cooperation: "Japon Deniz İşbirliği"
 GER_japanese_naval_cooperation_desc: "Özellikle denizcilik konularında [JAP.GetAdjective]'lerden öğrenecek çok şeyimiz var. Ortak bir teknoloji çabası kurarak, birbirimizin bilgilerinden en iyi şekilde yararlandığımızdan emin olabilir ve ortak bir güç olarak zaten sahip olduğumuz şeyleri yeniden icat etmek için harcanan zamanı azaltabiliriz."
 GER_negotiate_old_colonies_in_the_east: "Doğudaki Eski Sömürgeler İçin Müzakere Et"
 GER_negotiate_old_colonies_in_the_east_desc: "Doğu Asya'daki sömürge varlıklarımızın çoğu Büyük Savaş sırasında [JAP.GetAdjective]'ler tarafından bizden alındı. Şimdi diplomatik ilişkilerimizin iyileştirilmesiyle aktif olarak ilgilendiğimize göre, bu sömürgelerin bir kısmını diplomatik yollarla geri alabiliriz."
 GER_claim_old_colonies_in_the_east_tt: "§YGrup Üyeleri§! ve §Y[CHI.GetNameWithFlag]§!'a §YGüneydoğu Asya§!'daki eski [GER.GetAdjective] sömürgelerinin kontrolünü talep eden bir olay gönderir. Reddetmeleri veya bölgenin müttefik olarak görmediğimiz bir ülke tarafından kontrol edilmesi durumunda, tartışmalı eyaletler üzerinde §Yiddialar§! kazanır."
 GER_negotiate_old_colonies_in_the_east_tt: "Kontrol ettikleri aşağıdaki eyaletlerden herhangi biri bize devredilecektir:\n§Y[684.GetName]\n[647.GetName]\n[646.GetName]\n[633.GetName]\n[743.GetName]\n[979.GetName]\n[737.GetName]\n[726.GetName]\n[725.GetName]\n[634.GetName]§!"
 GER_sentinels_of_the_pacific: "Pasifik'in Nöbetçileri"
 GER_sentinels_of_the_pacific_desc: "Pasifik'teki dayanak noktalarımız genellikle az gelişmiştir ve ne kendi Kriegsmarine'imiz ne de müttefiklerimizin donanmaları için herhangi bir kullanıma uygun değildir. Pasifik'teki ilgili alanlarda uygun deniz altyapısının kurulduğundan emin olmak için önemli bir çaba gösterilmelidir."
 GER_sentinels_of_the_pacific_tt: "Aşağıdaki kontrol edilen her eyalet: §Y\n[336.GetName]\n[335.GetName]\n[743.GetName]\n[633.GetName]\n[646.GetName]§!"
 GER_create_asian_reichskommissariat: "Asya Reichskommisariatları Oluştur"
 GER_create_asian_reichskommissariat_desc: "Sıradan bir sömürgenin birçok faydası vardır, ancak Führerimizin Asya'daki sömürgelerimiz için daha da büyük planları var. Sömürge yasasını yürürlüğe koymak, ilgili herkes için faydalı olmalıdır!"
 GER_south_east_asian_natural_wealth: "Güneydoğu Asya Doğal Zenginliği"
 GER_south_east_asian_natural_wealth_desc: "Güneydoğu Asya bölgesi, bize büyük fayda sağlayacak doğal kaynaklar açısından zengindir. Mevcut sahipleri bu toprakları ideal bir şekilde geliştirmiyor ve topraklar hiçbir zaman bize ait olmasa da, sözde demokrasilerin haklı olarak bizim olan sömürgeleri çalmasını bu tür bir duygu durdurmadı ve bizi de durdurmayacak!"
 GER_south_east_asian_natural_wealth_tt: "Güneydoğu Asya topraklarımızı iyileştirmek için §YHarita Üzeri Kararlar§!'ın kilidini açar"
 GER_the_proud_eagle_and_the_resurgent_dragon: "Gururlu Kartal ve Yeniden Dirilen Ejderha"
 GER_the_proud_eagle_and_the_resurgent_dragon_desc: "[CHI.GetNameDef]'deki dostlarımıza yönelik bir [JAP.GetAdjective] işgali tehdidi sürekli üzerimizde dolaşıyor. Pasif bir şekilde saldırmalarını beklemenin bir faydası olmayacak. [JAP.GetNameDef] savaşçılarına karşı savaşa hazırlanmalıyız, kendi topraklarımızda veya onlarınkinde."
 GER_blitzkrieg_across_the_pacific: "Pasifik Boyunca Blitzkrieg"
 GER_blitzkrieg_across_the_pacific_desc: "Pasifik'te savaşmak, birliklerimizin çoğunlukla eğitildiği şeyden farklıdır. Ayrıca, taktiklerimizin biraz ince ayara ihtiyacı olabilir. Bunun bir zayıflık olduğuna inanmıyoruz, aksine bunun bizi daha güçlü kıldığına inanıyoruz. Düşmanın savunmaları bildikleri üzerine kuruludur ve Pasifik'te yeni bir savaş yapma şekli tasarlayarak onları gafil avlayabiliriz."
 GER_molotov_ribbentrop_pact: "$GER_mol_rib_pact$"
 GER_molotov_ribbentrop_pact_desc: "$GER_mol_rib_pact_desc$"
 GER_treaty_with_the_ussr: "$GER_soviet_treaty$"
 GER_treaty_with_the_ussr_desc: "$GER_soviet_treaty_desc$"
 GER_support_finland: "Finlandiya'yı Destekle"
 GER_support_finland_desc: "[FIN.GetAdjective]'ler uzun süredir [SOV.GetAdjective]'lerle [146.GetName] üzerinde bir çatışma içindeler. Bölgede gerilimler artarken, onları desteklemek ve dolayısıyla onları bize daha yakın hale getirmek bizim çıkarımızadır."
 GER_alliance_with_the_ussr: "$GER_soviet_ally$"
 GER_alliance_with_the_ussr_desc: "$GER_soviet_ally_desc$"
 GER_war_with_the_ussr: "$GER_ussr_war_goal$"
 GER_war_with_the_ussr_desc: "$GER_ussr_war_goal_desc$"
 GER_puppet_turkey: "$GER_turkey_puppet$"
 GER_puppet_turkey_desc: "$GER_turkey_puppet_desc$"
 GER_befriend_turkey: "$GER_turkey_friend$"
 GER_befriend_turkey_desc: "$GER_turkey_friend_desc$"
 GER_influence_the_middle_east: "Orta Doğu'yu Etkile"
 GER_influence_the_middle_east_desc: "Tarihsel olarak Orta Doğu ile çok az ortak yanımız olmasına rağmen, hiç kimse bölgenin bizim için ilgi çekici olduğunu inkar edemez. Gerekirse bölgede diplomatik ağırlığımız olduğundan emin olmak için bölgedeki etkimizi yaymalıyız."
 GER_the_final_blow_to_communism: "Komünizme Son Darbe"
 GER_the_final_blow_to_communism_desc: "[SOV.GetNameDef] ile başa çıkmak, Avrupa'daki komünizme karşı haçlı seferimizin sonu olamaz. Komünist uluslar yakınımızda var olduğu sürece mücadeleye devam etmeliyiz. Kızıl tehdit tamamen ortadan kaldırılana kadar dinlenemeyiz!"
 GER_war_against_communism_tt: "Dünyadaki herhangi bir §YKominist§! ulusa karşı §Yİlhak§! savaş hedefi kazan. Mevcut hedefler:"
 GER_war_against_european_communism_tt: "§YAvrupa§!'daki herhangi bir §YKominist§! ulusa karşı §Yİlhak§! savaş hedefi kazan. Mevcut hedefler:"
 GER_crossing_the_atlantic_dockyards_tt: "[ROOT.GetNameWithFlag] tarafından tamamen kontrol edilen Avrupa kıyı eyaletlerine §Y2 $dockyard$§! ekle, inşa edilen her tersane için §Y1 $arms_factory$§! kaldır. \n(Etkiler en fazla [?crossing_the_atlantic_max_states_for_dockyards|Y0] eyalete uygulanır ve en az bir $arms_factory$ bulunan kıyı eyaletlerine öncelik verilir)"

 #INNER CIRCLE
 GER_inner_circle_member_title: "Reichsleiter"
 GER_ascension_of_todt: "$GER_inner_circle_member_title$ Todt"
 GER_ascension_of_todt_desc: "Askeri deneyime sahip yetenekli bir mühendis olarak Fritz Todt, Führer'e yetkin bir danışman olduğunu kanıtlamıştır. Göreceli hareket özgürlüğü verildiğinde, [ROOT.GetNameDef] için çok faydalı olabileceğine inanıyoruz."
 GER_ascension_of_speer: "$GER_inner_circle_member_title$ Speer"
 GER_ascension_of_speer_desc: "Eğitimli bir mimar olarak Albert Speer, ülkenin devam eden refahı için en değerli becerilere sahiptir. Ona göreceli hareket özgürlüğü tanıyarak, hem becerilerinden hem de [ROOT.GetAdjective] inşaat sektöründeki büyük oyuncularla olan bağlantılarından faydalanabiliriz."
 GER_ascension_of_goring: "$GER_inner_circle_member_title$ Göring"
 GER_ascension_of_goring_desc: "Yetenekli bir komutanın Führer'in İç Çemberi'nde yeri vardır. Hermann Göring sadece yetenekli bir komutan değil, aynı zamanda Führer'in uzun süreli bir suç ortağı olduğundan, ona göreceli hareket özgürlüğü tanımak çok az riskle büyük ödül sağlamalıdır."
 GER_ascension_of_goebbels: "$GER_inner_circle_member_title$ Goebbels"
 GER_ascension_of_goebbels_desc: "Führer'in, halkın desteğini sürdürmesine yardımcı olabilecekler için en iç çemberinde her zaman yer vardır. Yakın bir takipçi ve yetenekli bir konuşmacı olarak, Joseph Goebbels'e göreceli hareket özgürlüğü tanımak bize son derece faydalı olmalıdır."
 GER_rally_the_industrialists: "Sanayicileri Topla"
 GER_rally_the_industrialists_desc: "Sanayiciler ülkemiz içinde önemli bir güce sahiptir. Onları kendi tarafımıza çekmek bir zaman yatırımı olacaktır, ancak Rudolf Hess'in bize değeceğine dair güvence verdiği bir yatırım."
 GER_glorify_party_rallies: "Parti Mitinglerini Yücelt"
 GER_glorify_party_rallies_desc: "Siyasi çekirdeğimiz olmadan ülke bocalar. Martin Bormann, Parti Mitinglerimizin halktan daha fazla destek toplamak için iyileştirilebileceğine ve böylece hükümetin nasıl kurulacağı konusunda daha özgür hareket etmemize olanak tanıyacağına dikkat çekti."
 GER_total_control_over_domestic_affairs: "İç İşler Üzerinde Tam Kontrol"
 GER_total_control_over_domestic_affairs_desc: "İç işlerimizi tamamen Parti Şansölyesi'ne bırakma ihtimali cesur bir hamle gibi görünebilir. Ancak Führer emin. Parti Şansölyesi tarafından şimdiye kadar yürütülen görevler beklentilerin çok ötesinde ele alındı ve [ROOT.GetLeader] bunu daha önemli konulara odaklanmak üzere ona bırakmaktan rahatlık duyuyor."
 GER_fuhrerprinzip_inner_circle_tt: "§Yİç Çember§! Mekaniğini etkinleştirir.\n\n"
 GER_rally_the_industrialists_hess_tt: "§Y$germany.107.t$§! olay zincirinin gerçekleşmesini önleyecektir."
 GER_wunderwaffe_dornberger_trait_tt: "§Y$GER_walter_dornberger$§! ($high_command$): \nÖzellik §Y$GER_head_of_the_missile_department$§!'ı §Y$GER_head_of_experimental_weapons$§! ile değiştir \nEtkili değişim: \nTesis İkmal Tüketimi: §G-10.00§! \n$specialization_naval_speed_factor$: §G+10%§! \n$specialization_nuclear_speed_factor$: §G+10%§!"
 GER_rally_the_industrialists_hess_stays_tt: "§Y$GER_rudolf_hess$§!'in meşhur uçuşunu yapmasını engeller."
 unlock_decision_category_explained: "§Y$CATEGORY$§! Kararlarının kilidini açar. $DESC$"
 GER_integration_of_puppet_economies_decisions_tt: "Bu kararlar, kuklalarımızın ekonomilerini geliştirmemize veya sömürmemize olanak tanır."
 GER_a_strong_successor_trigger_tt: "§Yİç Çember§! içindeki §Y3§! Yükselmiş Danışmanın tamamı kilit taşı odağını tamamladı."
 GER_a_strong_successor_tt: "Olay alır: '§Y$GER_inner_circle.02.t$§!'. \n§Yİç Çember§! içindeki mevcut Yükselmiş $GER_inner_circle_member_title$lardan biri, Ülke Lideri olarak §Y[ROOT.GetLeader]§!'in yerini alabilir."
 GER_a_strong_successor_current_advisors_tt: "Mevcut Yükselmiş Danışmanlar: §Y[GetAscendedAdvisorName1]§!, §Y[GetAscendedAdvisorName2]§! veya §Y[GetAscendedAdvisorName3]§!."

