ROM_urbanize_the_small_cities:0 "Urbanize the Small Cities"
ROM_urbanize_the_small_cities_desc:0 "With the increasing number of the worker's class we need to accomodate them near the industry centers so urbanizing villages around factories will create room for expansion."
