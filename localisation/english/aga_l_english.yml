  alpacon_banged_storyline:0 "Bir gün mahalleye madenci olan bir adam taşınır. Ve bu adam evlidir. Madenci hergün işte cok yoruldugundan karısına yeterli ilgiyi gösteremez ve karısı artık gözünü başka yerlere koymaya başlar. Bir gün kocası işteyken karşı apartmandaki alpacon adlı bir genci evine çağırır. Derki: \n -Alpacon yatak odamdaki gardobun yeri değişmesi lazım ve erkek gücü istiyor. Yardım edermisin.\n Alpacon:\n -tabikide ablacıgım\n Saat 4 gibi odaya girerler ve işi pişirirler 1 saat sonra Madenci işten gelir ve kapıyı açar. Yatak odasından gelen sesleri duyar ve kapıyı kınırıp bakar ve onları görür. Sonra ağlayıp mutfağa geçer ve masaya oturup bunun bitmesini bekler. Sonra herkes mahallede madenciye gavat demeye başlar. Bundan rahatsız olan madenci  ülke sahibi al - bagdadiye gider ve alpaconu şikayet eder. Bagdadi güçlü istikarı ve  Yandaşları ile ( Hacı - el kürdi  & RP god ) alpaconun ismini Lolipop yapar ve alpacon sürgün edilir. Mahalle halkı buna karşı cıkar ve Bagdadinin istikrarı sarsılır."
