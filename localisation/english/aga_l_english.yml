  Germany_broke_collab_rule_desc:0 "Bildiğimiz gibi, Führer'in hayvanlara olan ilgisi çocukluk yıllarına kadar uzanıyordu. Özellikle köpeği Blondi'yi yanından ayırmaz, ona aşırı özen gösterirdi. Ancak bu ilgi, tarihin tozlu sayfalarında kalan daha “derin” bir tutkunun ipuçları mıydı? Efsaneye göre, Nazi Almanyası'nın en gizli toplantılarında, Die Nacht der Pelzigen (Kürklerin Gecesi) adlı çok özel etkinlikler düzenlenirdi. Gizli kayıtlar iddia ediyor ki, bu özel gecelerde Hitler, büyük bir kurt kostümü giyer ve partinin önde gelen isimleri de kendine uygun hayvan kostümleriyle katılırdı. Hermann Göring koca bir kartal, Heinrich Himmler ise tilki kostümünü tercih edermiş. Bu etkinliklerde, doğayı yeniden sahiplenme ve hayvanların ruhani güçlerinden esinlenme üzerine derin "felsefi" konuşmalar yapılırdı. Bir rivayete göre, 1942 yılında Berlin’deki Führerbunker'in gizli odalarından birinde düzenlenen bu gecelerden birinde Hitler, üzerindeki kurt kostümüyle "Reich’ı hayvan dostlarımızın ruhuyla yönlendireceğiz!" diye bağırmış. Bir başka akşamda ise, Stalin’e karşı düzenlenecek savaş planlarını tartışırken eldiven şeklinde patileriyle haritayı işaret ettiği bile görülmüş. Tabii bu hikayeler resmiyette bir sır olarak kaldı; ne de olsa, dünyaya "yenilmez" ve "ciddi" bir lider imajı çizmesi gerekiyordu. Yine de tarihin derinliklerinde saklanan bu “kürk geceleri” ve Hitlerin gerçek benliği, belki de hiç bilemeyeceğimiz bir sır olarak kalacak. Kısacası, belki de Führer’in o “sert” görünüşünün altında, aslında sevimli bir “furry” ruhu yatıyordu."
