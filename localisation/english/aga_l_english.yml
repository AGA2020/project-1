 USA_federal_housing_act_desc:1 "As part of our ongoing efforts to eradicate poverty in the United States, we will create a program of federally-subsidized housing."
 home_of_the_free_2:0 "Home of the Free"
 home_of_the_free_2_desc:0 "USA considers itself a bastion and maybe even the cradle of democracy and liberty. Whatever they choose to be, their values are difficult to compromise, however tempting some opportunities might seem."
 home_of_revolution_2:0 "Home of the Revolution"
 home_of_revolution_2_desc:0 "Comrades, with the defeat of the vile Trotskyite counter revolutionaries we were able to focus on defending the revolution. Our goal, our hope, our slogan is Socialism in One Country. We will build a bountiful socialist utopia here in the Soviet Union and the rest of the world will inevitably embrace it."
  SOV_Tolkach:0 "Tolkach"
  SOV_Tolkach_desc:0 "The government organization Tolkach is responsible for the effective execution of the 5 year plans, failure to comply will result in Tolkach stepping and ensuring that any difficulties are dealt with in a proper fashion."
  GER_reichswerke_expansion:0 "Reichswerke Expansion"
  GER_reichswerke_expansion_desc:0 "Under the directives of the Nazi regime, the Reichswerke Hermann Göring is spearheading an ambitious industrial expansion project. By increasing the maximum building slots in our states by 10%, we will create the necessary infrastructure to bolster our war production capabilities. This expansion is critical to ensuring that our military forces are well-supplied and ready to achieve total victory. The Reich's industrial power will know no bounds as we build a stronger, more resilient Germany."
 sour_loser_2:0 "Bitter Loser"
 sour_loser_2_desc:0 "Bitterness over defeat in the Great War dominates the politics of this nation."
 water_mediterranean:0 "Mediterranean(Ocean)"
 water_fjords_mediterranean:0 "Mediterranean(Fjords and Archipelagos)"
 uk_imperial_industrial_development:0 "Imperial Industrial Development"
 uk_imperial_industrial_development_desc:0 "To maintain our position as a global power and support the war effort, we are launching the Imperial Industrial Development initiative. This focus will increase the maximum building slots in our states by 10%, enabling us to construct additional factories and expand our industrial capacity. By enhancing our infrastructure, we ensure that our military forces are well-equipped and ready to defend the Empire and its interests across the globe. The strength of Britain's industry will be the backbone of our victory."
