  kurdish_tales:0 "§CHacı ve Alim: Bir Kürt’ün Rolü§!\n Ebubekir el Bağdadi, Suriye ziyaretinde bir köyde kendini "Hacı Antonius" olarak tanıtan bir Kürtle tanışır. Antonius, eski bir Latin hacı kıyafeti içinde, yaptığı rplerle halkı eğlendirir. Ebubekir, onun Kürt olduğunu hemen anlar ve neden böyle davrandığını sorar. Antonius gülerek, “Hayalim rp tanrısı olmaktı, ama bunu başaramayınca hayalini yaşatmaya başladım,” der.\n Ebubekir, bu mizah dolu adamı yanına alır ve birlikte köy köy dolaşırlar. Antonius halkı yaptığı rplerle güldürürken, Ebubekir öğütleriyle onlara ilham verir. Bir gün, kaldıkları handa hırsızlar onları soymaya kalkışır. Antonius, kendilerini önemli bir hac heyeti gibi tanıtarak hırsızları kandırır. Ebubekir, bu zekice oyuna hayran kalsa da onu uyarır: “Rpyi iyilik yolunda kullan, Antonius.”\n Antonius’un rpciliği ve Ebubekir’in bilgeliği, onları kısa sürede efsanevi bir ikili yapar. Bu dostluk, halk arasında unutulmaz bir hikâye olarak anlatılır."
