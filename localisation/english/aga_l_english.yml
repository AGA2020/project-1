 aga.2.c:0 "Hitler Dead: The Reich Crumbles!" 
 aga.2.b:0 "The Führer is Dead: A Triumph for the Soviet Union!" 
 aga.2.a:0 "Der Führer ist tot: Das Ende einer Ära" 
 aga.2.desc:0 "As the Allied forces close in on Berlin, the once-mighty Führer retreats into the depths of his bunker, haunted by the weight of his failures. With the city under siege and hope dwindling, Adolf Hitler makes a fateful decision. In a desperate act, he ends his own life, leaving Germany to face the consequences of defeat. The Third Reich crumbles as chaos descends upon the nation, marking a pivotal moment in history."
