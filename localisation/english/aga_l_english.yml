  Hun_blitz:0 "Magyarian Blitzkrieg"
  Hun_blitz_desc:0 "By enhancing the speed and agility of our tank divisions, we have perfected the ability to break through enemy lines swiftly. Adapting the traditional Blitzkrieg tactics to our forces, the Hungarian Army now strikes with increased power and lethality. This new strategy will ensure our dominance on the battlefield by boosting the speed and effectiveness of our tanks."
